<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | BiciFastness</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-straight/css/uicons-bold-straight.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        :root { --bg-main: #0d0d0d; --bg-card: #1a1a1a; --bg-input: #222; --text-main: #f1efeb; --text-muted: #888; --border: #333; --primary: #ffbb33; }
        
        body { margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; transition: all 0.3s; }
        
        nav { background: #000; border-bottom: 1px solid var(--border); padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .brand { display: flex; align-items: center; text-decoration: none; color: var(--primary); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px;}
        nav .brand img { height: 35px; width: auto; display: block; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        nav .links { display: flex; align-items: center; }
        nav .links a { color: var(--text-muted); text-decoration: none; margin-left: 20px; font-weight: 600; transition: color 0.3s; line-height: 1; }
        nav .links a:hover { color: var(--text-main); }
        .info-icon { color: var(--text-muted); font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; text-decoration: none; line-height: 0; margin-top: -3px; }
        .info-icon:hover { color: var(--primary); }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--border); padding-bottom: 15px; flex-wrap: wrap; gap: 15px;}
        .title-group { display: flex; align-items: center; gap: 15px; }
        .badge-count { background: #0071c3; padding: 4px 10px; border-radius: 20px; font-weight: 700; color: white;}
        
        .bot-toggle { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 8px 15px; border-radius: 30px; border: 1px solid var(--border); }
        .bot-toggle span { font-weight: 700; font-size: 0.9rem; color: #00C851; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00C851; }
        input:checked + .slider:before { transform: translateX(20px); }

        .pending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .admin-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;}
        .card-header { display: flex; justify-content: space-between; font-weight: 700; color: #0071c3; }
        
        .bot-status { font-size: 0.9rem; font-weight: 600; padding: 12px; border-radius: 8px; background: var(--bg-input); border: 1px solid var(--border); display: none; margin-top: 5px; line-height: 1.4; }
        .bot-status.loading { color: #aaaaaa; border-color: #444; }
        .bot-status.success { color: #00C851; border-color: #00C851; background: rgba(0, 200, 81, 0.1); }
        .bot-status.warning { color: #ffbb33; border-color: #ffbb33; background: rgba(255, 187, 51, 0.1); }
        .bot-status.danger { color: #ff4444; border-color: #ff4444; background: rgba(255, 68, 68, 0.1); }

        button { padding: 10px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-view { background: #222; color: #fff; border: 1px solid #444; width: 100%; }
        .actions { display: flex; gap: 10px; margin-top: 10px;} .actions button {flex: 1;}
        .btn-approve { background: #00C851; color: #003311; } .btn-reject { background: #ff4444; color: #4d0000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 80vh; border-radius: 8px; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 2rem; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>
    <nav>
        <a href="home.html" class="brand">
            <img src="images/logo.png" alt="BICIFASTNESS" onerror="this.outerHTML='BICIFASTNESS'">
        </a>
        <div class="nav-right">
            <div class="links"><a href="home.html">Volver a Inicio</a></div>
            <a href="info.html" class="info-icon" title="Cómo funciona"><i class="fi fi-bs-info"></i></a>
        </div>
    </nav>

    <div class="container">
        <div class="admin-card" style="margin-bottom: 30px;">
            <div class="card-header"><span style="color:#FFD700;">🔥 Destacar Ruta de la Semana</span></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="highlight-input" placeholder="Ej: 045-162" style="width:100%; padding:10px; border-radius:6px; background:var(--bg-input); border:1px solid var(--border); color:var(--text-main); font-family:inherit;">
                <button id="highlight-btn" style="background:#FFD700; color:#111;">Destacar Ruta</button>
            </div>
        </div>

        <div class="header-panel">
            <div class="title-group">
                <h2 style="margin:0;">Pendientes</h2>
                <div class="badge-count" id="pending-count">0</div>
            </div>
            <div class="bot-toggle">
                <span>🤖 Bot Verificador Simple</span>
                <label class="switch">
                    <input type="checkbox" id="bot-switch">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <div class="pending-grid" id="pending-grid"></div>
    </div>
    
    <div class="modal" id="photo-modal"><span class="close-modal" id="close-modal">&times;</span><img id="modal-img"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk", authDomain: "bicifastness.firebaseapp.com", projectId: "bicifastness", messagingSenderId: "656116731421", appId: "1:656116731421:web:a4154d028fe9721c5800f4" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let isBotActive = false; let botQueue = []; let isProcessingQueue = false;

        document.getElementById('bot-switch').addEventListener('change', (e) => {
            isBotActive = e.target.checked;
            if(isBotActive) { document.querySelectorAll('.bot-status').forEach(el => el.style.display = 'block'); processBotQueue(); } 
            else { document.querySelectorAll('.bot-status').forEach(el => { el.style.display = 'none'; el.className = 'bot-status'; }); }
        });

        // ------------------ LOGICA DEL BOT OCR ------------------
        async function processBotQueue() {
            if(isProcessingQueue || !isBotActive || botQueue.length === 0) return;
            isProcessingQueue = true;

            const trip = botQueue.shift();
            const statusEl = document.getElementById(`bot-${trip.id}`);
            
            if(statusEl && isBotActive) {
                statusEl.className = 'bot-status loading';
                statusEl.innerHTML = '🤖 Leyendo imagen...';
                
                try {
                    const result = await Tesseract.recognize(trip.foto_url, 'spa');
                    const text = result.data.text.toLowerCase().replace(/o/g, '0');
                    
                    const claimed_m = Math.floor(trip.tiempo_segundos / 60);
                    const claimed_s = trip.tiempo_segundos % 60;

                    const origRaw = trip.ruta.split('-')[0].toLowerCase();
                    const destRaw = trip.ruta.split('-')[1].toLowerCase();
                    const origSearch = origRaw.replace(/^0+/, '');
                    const destSearch = destRaw.replace(/^0+/, '');
                    const verify_Ids = (text.includes(origSearch) || text.includes(origRaw)) && (text.includes(destSearch) || text.includes(destRaw));

                    let timeFound = false; let isApp = false; 
                    const durationRegex = /(\d{1,3})\s*m\.?\s*(\d{1,2})\s*s\.?/g;
                    const allDurations = [...text.matchAll(durationRegex)];
                    
                    if (allDurations.length > 0) isApp = true;
                    
                    for(let match of allDurations) {
                        let t_sec = (parseInt(match[1]) * 60) + parseInt(match[2]);
                        if (Math.abs(t_sec - trip.tiempo_segundos) <= 2) { timeFound = true; break; }
                    }

                    let mathStatus = "not_found"; 
                    const timeRegex = /\d{2}:\d{2}:\d{2}/g;
                    const times = text.match(timeRegex);

                    if (times && times.length >= 2) {
                        isApp = true; mathStatus = "failed"; 
                        for(let i = 0; i < times.length - 1; i++) {
                            const t1 = times[i].split(':'); const sec1 = (+t1[0]) * 3600 + (+t1[1]) * 60 + (+t1[2]);
                            const t2 = times[i+1].split(':'); const sec2 = (+t2[0]) * 3600 + (+t2[1]) * 60 + (+t2[2]);
                            let realDiff = Math.abs(sec2 - sec1);
                            if (Math.abs(realDiff - trip.tiempo_segundos) <= 15) { mathStatus = "passed"; break; }
                        }
                    }
                    if (text.includes('€') || /0[.,]00/.test(text)) isApp = true;

                    if (claimed_s >= 60) {
                        statusEl.className = 'bot-status danger'; statusEl.innerHTML = `🔴 <b>FALSO:</b> ${claimed_s} segundos imposible.`;
                    } else if (verify_Ids && (timeFound || mathStatus === "passed")) {
                        statusEl.className = 'bot-status success'; statusEl.innerHTML = `🟢 <b>VERDADERO:</b> Todo cuadra.`;
                    } else if (!verify_Ids && !isApp) {
                        statusEl.className = 'bot-status danger'; statusEl.innerHTML = `🔴 <b>FALSO:</b> No detecto la app BiciMAD.`;
                    } else if (mathStatus === "failed" && !timeFound && isApp) {
                        statusEl.className = 'bot-status danger'; statusEl.innerHTML = `🔴 <b>FALSO:</b> Tiempos matemáticos erróneos.`;
                    } else {
                        statusEl.className = 'bot-status warning'; statusEl.innerHTML = `🟠 <b>DUDOSO:</b> Revisión manual.`;
                    }
                } catch (error) {
                    statusEl.className = 'bot-status warning'; statusEl.innerHTML = '🟠 <b>Dudoso:</b> Error al leer imagen.';
                }
            }
            isProcessingQueue = false; if(isBotActive) processBotQueue(); 
        }

        // ------------------ AUTENTICACIÓN ------------------
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "home.html"; return; }
            const userDoc = await getDoc(doc(db, "usuarios", user.email));
            if (userDoc.exists() && userDoc.data().isAdmin === true) {
                loadPendingTrips(); loadCurrentHighlighted();
            } else { alert("Acceso denegado."); window.location.href = "home.html"; }
        });

        // ------------------ DESTACAR RUTA (Con Recálculo) ------------------
        async function loadCurrentHighlighted() { 
            const confDoc = await getDoc(doc(db, "config", "general")); 
            if(confDoc.exists() && confDoc.data().ruta_destacada) {
                document.getElementById('highlight-input').value = confDoc.data().ruta_destacada; 
            }
        }

        document.getElementById('highlight-btn').addEventListener('click', async () => { 
            const btn = document.getElementById('highlight-btn');
            btn.disabled = true; btn.innerText = "Aplicando...";
            
            const newRuta = document.getElementById('highlight-input').value.trim();
            if(!newRuta) { btn.disabled = false; btn.innerText = "Destacar Ruta"; return; }

            const confRef = doc(db, "config", "general");
            const confDoc = await getDoc(confRef);
            let historicas = [];
            let oldDestacada = null;

            if (confDoc.exists()) {
                const data = confDoc.data();
                oldDestacada = data.ruta_destacada;
                historicas = data.rutas_historicas || [];
                // Si había una ruta vieja y es distinta de la nueva, se vuelve histórica
                if (oldDestacada && oldDestacada !== newRuta && !historicas.includes(oldDestacada)) {
                    historicas.push(oldDestacada);
                }
            }
            
            await setDoc(confRef, { ruta_destacada: newRuta, rutas_historicas: historicas }, { merge: true });

            // Recalculamos los BiciRatings de la ruta antigua (baja a x1.5) y la nueva (sube a x2)
            if (oldDestacada) await recalcularRutaBiciRating(oldDestacada);
            await recalcularRutaBiciRating(newRuta);

            alert("Ruta destacada actualizada y rankings de jugadores recalculados.");
            btn.disabled = false; btn.innerText = "Destacar Ruta";
        });

        // ------------------ CARGAR PENDIENTES ------------------
        async function loadPendingTrips() {
            const grid = document.getElementById('pending-grid');
            const q = query(collection(db, "tiempos_viaje"), where("verificado", "==", false));
            const snap = await getDocs(q);
            grid.innerHTML = ''; let count = 0; botQueue = []; 

            snap.forEach((docSnap) => {
                count++; const data = docSnap.data(); const docId = docSnap.id;
                botQueue.push({ id: docId, foto_url: data.foto_url, ruta: data.ruta, tiempo_segundos: data.tiempo_segundos, email_real: data.email_real });

                grid.innerHTML += `
                    <div class="admin-card" id="card-${docId}">
                        <div class="card-header"><span>Ruta ${data.ruta}</span><span>${data.tiempo_formateado}</span></div>
                        <div style="font-size:0.8rem; color:#888;">Email: ${data.email_real}</div>
                        <div class="bot-status loading" id="bot-${docId}" style="${isBotActive ? 'display:block;' : 'display:none;'}">🤖 En cola...</div>
                        <button class="btn-view view-photo" data-url="${data.foto_url}" style="margin-top:10px;">Ver Captura</button>
                        <div class="actions">
                            <button class="btn-reject reject-btn" data-id="${docId}">Rechazar</button>
                            <button class="btn-approve approve-btn" data-id="${docId}" data-email="${data.email_real}" data-ruta="${data.ruta}">Aprobar</button>
                        </div>
                    </div>`;
            });
            document.getElementById('pending-count').innerText = count;
            if (count === 0) grid.innerHTML = `<div style="grid-column:1/-1; color:#888;">Todo al día.</div>`;
            else { attachEvents(); if(isBotActive) processBotQueue(); }
        }

        // ------------------ EL CEREBRO: CÁLCULO DE BICIRATING (USUARIOS) ------------------
        async function recalcularRutaBiciRating(rutaString) {
            // 1. Obtener multiplicadores desde Firebase Config
            let multiplier = 1;
            const confDoc = await getDoc(doc(db, "config", "general"));
            if(confDoc.exists()) {
                const data = confDoc.data();
                if (data.ruta_destacada === rutaString) multiplier = 2; // +100%
                else if (data.rutas_historicas && data.rutas_historicas.includes(rutaString)) multiplier = 1.5; // +50%
            }

            // 2. Traer todos los viajes verificados de ESTA ruta
            const qRoute = query(collection(db, "tiempos_viaje"), where("ruta", "==", rutaString), where("verificado", "==", true));
            const snap = await getDocs(qRoute);

            // 3. Filtrar para quedarnos solo con el MEJOR tiempo de cada usuario en esta ruta
            let userBestTimes = {}; 
            let usersInvolved = new Set(); // Todos los que alguna vez corrieron por aquí

            snap.forEach(d => {
                const data = d.data();
                const email = data.email_real;
                usersInvolved.add(email);
                
                // Si es su primera vez o es un tiempo mejor que el anterior que leímos
                if(!userBestTimes[email] || data.tiempo_segundos < userBestTimes[email].tiempo) {
                    userBestTimes[email] = { tiempo: data.tiempo_segundos };
                }
            });

            // 4. Ordenar los tiempos para sacar el Top 7 absoluto
            let topList = Object.entries(userBestTimes).map(([email, data]) => ({ email, ...data }));
            topList.sort((a, b) => a.tiempo - b.tiempo); // De más rápido a más lento

            // 5. Asignar los puntos base escalonados (Tu idea)
            let pointsMap = {};
            topList.forEach((u, index) => {
                let pts = 0;
                if (index === 0) pts = 80;
                else if (index === 1) pts = 65;
                else if (index === 2) pts = 55;
                else if (index === 3 || index === 4) pts = 35;
                else if (index === 5 || index === 6) pts = 20;

                // Multiplicamos y redondeamos para evitar decimales
                pointsMap[u.email] = Math.round(pts * multiplier);
            });

            // 6. Actualizar el perfil de CADA usuario que haya corrido en esta ruta
            for (let email of usersInvolved) {
                const routePoints = pointsMap[email] || 0; // Si ha caído del Top 7, gana 0 puntos.
                
                const userRef = doc(db, "usuarios", email);
                const userDoc = await getDoc(userRef);
                
                if (userDoc.exists()) {
                    let uData = userDoc.data();
                    let dictRutas = uData.puntos_por_ruta || {};
                    let totalViajes = uData.viajes_verificados_totales || 0; // Viajes totales
                    
                    // Actualizamos su medalla invisible para esta ruta específica
                    dictRutas[rutaString] = routePoints;

                    // SUMAMOS SU BICIRATING TOTAL
                    // (5 puntos por cada viaje subido y verificado) + (La suma de todas sus medallas en rutas)
                    let sumMedallas = 0;
                    for (let r in dictRutas) sumMedallas += dictRutas[r];

                    let finalBiciRating = (totalViajes * 5) + sumMedallas;

                    await updateDoc(userRef, {
                        puntos_por_ruta: dictRutas,
                        biciRating: finalBiciRating
                    });
                }
            }
        }

        // ------------------ EL CEREBRO 2: DUEÑOS DE ESTACIONES (CLANES) ------------------
        const userClanCache = {};
        async function getUserClan(email) {
            if (userClanCache[email] !== undefined) return userClanCache[email];
            const userDoc = await getDoc(doc(db, "usuarios", email));
            const clanId = userDoc.exists() ? (userDoc.data().clanId || null) : null;
            userClanCache[email] = clanId;
            return clanId;
        }

        async function recalcularEstacion(numEstacion) {
            const qAll = query(collection(db, "tiempos_viaje"), where("verificado", "==", true));
            const snap = await getDocs(qAll);

            let viajesPorRuta = {};
            snap.forEach(d => {
                const data = d.data();
                const parts = data.ruta.split('-');
                const orig = parts[0].replace(/^0+/, '') || "0";
                const dest = parts[1].replace(/^0+/, '') || "0";

                if (orig === numEstacion || dest === numEstacion) {
                    if (!viajesPorRuta[data.ruta]) viajesPorRuta[data.ruta] = [];
                    viajesPorRuta[data.ruta].push(data);
                }
            });

            let puntosClan = {};

            for (const [ruta, viajes] of Object.entries(viajesPorRuta)) {
                viajes.sort((a,b) => a.tiempo_segundos - b.tiempo_segundos);
                const top10 = viajes.slice(0, 10);

                for (let i = 0; i < top10.length; i++) {
                    const clanId = await getUserClan(top10[i].email_real);
                    if (clanId) {
                        let pts = 0;
                        if (i === 0) pts = 7;
                        else if (i === 1) pts = 5;
                        else if (i === 2) pts = 3;
                        else if (i >= 3 && i <= 9) pts = 1;
                        puntosClan[clanId] = (puntosClan[clanId] || 0) + pts;
                    }
                }
            }

            let dominante = null; let maxPts = 0; let sumTotal = 0;
            for (const [clan, pts] of Object.entries(puntosClan)) {
                sumTotal += pts;
                if (pts > maxPts) { maxPts = pts; dominante = clan; }
            }

            await setDoc(doc(db, "estaciones_stats", numEstacion), {
                clan_dominante: dominante, total_puntos: sumTotal, puntos_detalle: puntosClan
            }, { merge: true });
        }


        // ------------------ EVENTOS DE BOTONES (APROBAR/RECHAZAR) ------------------
        function attachEvents() {
            document.querySelectorAll('.view-photo').forEach(b => b.onclick = e => { document.getElementById('modal-img').src = e.target.getAttribute('data-url'); document.getElementById('photo-modal').style.display = 'flex'; });
            
            document.querySelectorAll('.approve-btn').forEach(b => b.onclick = async e => { 
                e.target.disabled = true; e.target.innerText = "Calculando Ratings..."; 
                
                const docId = e.target.getAttribute('data-id');
                const ruta = e.target.getAttribute('data-ruta');
                const email = e.target.getAttribute('data-email');

                try {
                    // 1. Aprobar viaje
                    await updateDoc(doc(db, "tiempos_viaje", docId), { verificado: true }); 

                    // 2. Sumar +1 viaje válido al perfil del usuario
                    const userRef = doc(db, "usuarios", email);
                    const userD = await getDoc(userRef);
                    if(userD.exists()) {
                        let vvt = (userD.data().viajes_verificados_totales || 0) + 1;
                        await updateDoc(userRef, { viajes_verificados_totales: vvt });
                    }

                    // 3. Recalcular BiciRating (Jugadores)
                    await recalcularRutaBiciRating(ruta);

                    // 4. Recalcular Dominio de Estaciones (Clanes)
                    const parts = ruta.split('-');
                    const estOrigen = parts[0].replace(/^0+/, '') || "0";
                    const estDestino = parts[1].replace(/^0+/, '') || "0";
                    await recalcularEstacion(estOrigen);
                    await recalcularEstacion(estDestino);

                    loadPendingTrips(); 
                } catch(err) {
                    alert("Error al aprobar: " + err.message);
                    e.target.disabled = false; e.target.innerText = "Aprobar";
                }
            });

            document.querySelectorAll('.reject-btn').forEach(b => b.onclick = async e => { 
                if(confirm("¿Seguro que quieres borrar este récord?")) { 
                    e.target.disabled = true; e.target.innerText = "Borrando..."; 
                    await deleteDoc(doc(db, "tiempos_viaje", e.target.getAttribute('data-id'))); 
                    loadPendingTrips(); 
                } 
            });
        }
        
        document.getElementById('close-modal').onclick = () => document.getElementById('photo-modal').style.display = 'none';
    </script>
</body>
</html>
