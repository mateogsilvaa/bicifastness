<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiciFastness - Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #000000;
            --accent-blue: #0071c3;
            --accent-cream: #f1efeb;
            --text-primary: #ffffff;
            --text-secondary: #f1efeb;
            --border-color: #333333;
            --card-bg: #1a1a1a;
            --hover-bg: #2a2a2a;
            --error: #dc3545;
            --success: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue);
            text-decoration: none;
        }

        .nav-logo {
            width: 40px;
            height: 40px;
            background: var(--accent-blue);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-weight: 800;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-blue);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .auth-container:hover {
            transform: translateY(-2px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo {
            width: 60px;
            height: 60px;
            background: var(--accent-blue);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            color: var(--text-primary);
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .auth-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 113, 195, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--bg-primary);
            padding: 0.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: var(--text-primary);
        }

        .tab-btn:hover:not(.active) {
            background: var(--hover-bg);
            color: var(--text-primary);
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: var(--text-primary);
        }

        .btn-primary:hover:not(:disabled) {
            background: #005a9e;
            transform: translateY(-1px);
            box-shadow: 0 10px 30px rgba(0, 113, 195, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
        }

        .btn-secondary:hover {
            background: var(--accent-blue);
            color: var(--text-primary);
        }

        /* Alert */
        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            font-weight: 500;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 2rem;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: var(--accent-blue);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                gap: 1rem;
            }

            .nav-links a:not(.nav-brand) {
                display: none;
            }

            main {
                padding: 1rem;
            }

            .auth-container {
                padding: 2rem;
            }

            .auth-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-brand">
            <div class="nav-logo">🚴</div>
            <span>BiciFastness</span>
        </a>
        <div class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="ranking.html">Rankings</a>
            <a href="subir.html">Subir Tiempo</a>
            <a href="profile.html">Mi Perfil</a>
        </div>
    </nav>

    <main>
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">🚴</div>
                <h1 class="auth-title">Bienvenido</h1>
                <p class="auth-subtitle">Inicia sesión o regístrate para competir</p>
            </div>

            <div class="alert" id="alert"></div>

            <div class="tab-nav">
                <button class="tab-btn active" onclick="switchTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
            </div>

            <!-- Login Tab -->
            <div class="tab-content active" id="login-tab">
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="login-email">Correo electrónico</label>
                        <input type="email" id="login-email" class="form-input" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="login-password">Contraseña</label>
                        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary" id="login-btn">Iniciar Sesión</button>
                </form>
            </div>

            <!-- Register Tab -->
            <div class="tab-content" id="register-tab">
                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label" for="register-name">Nombre completo</label>
                        <input type="text" id="register-name" class="form-input" placeholder="Tu nombre" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="register-email">Correo electrónico</label>
                        <input type="email" id="register-email" class="form-input" placeholder="tu@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="register-password">Contraseña</label>
                        <input type="password" id="register-password" class="form-input" placeholder="Mínimo 6 caracteres" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="register-confirm">Confirmar contraseña</label>
                        <input type="password" id="register-confirm" class="form-input" placeholder="Repite tu contraseña" required>
                    </div>

                    <button type="submit" class="btn btn-primary" id="register-btn">Crear Cuenta</button>
                </form>
            </div>

            <div class="back-link">
                <a href="index.html">← Volver al inicio</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk",
            authDomain: "bicifastness.firebaseapp.com",
            databaseURL: "https://bicifastness-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bicifastness",
            storageBucket: "bicifastness.firebasestorage.app",
            messagingSenderId: "656116731421",
            appId: "1:656116731421:web:a4154d028fe9721c5800f4",
            measurementId: "G-CSFX8EX71S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Check if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // DOM Elements
        const alert = document.getElementById('alert');
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');

        // Tab switching
        function switchTab(tab) {
            // Update buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            
            // Clear alerts
            hideAlert();
        }

        // Alert functions
        function showAlert(message, type = 'error') {
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
        }

        function hideAlert() {
            alert.classList.remove('show');
        }

        // Login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Iniciando sesión...';
            hideAlert();

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // User will be redirected by onAuthStateChanged
            } catch (error) {
                console.error('Login error:', error);
                let errorMessage = 'Error al iniciar sesión.';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'Usuario no encontrado.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Contraseña incorrecta.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Email inválido.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Demasiados intentos. Espera unos minutos.';
                        break;
                    case 'auth/invalid-credential':
                        errorMessage = 'Credenciales inválidas.';
                        break;
                }

                showAlert(errorMessage);
            }

            loginBtn.disabled = false;
            loginBtn.textContent = 'Iniciar Sesión';
        });

        // Register form submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm').value;

            // Validation
            if (password !== confirmPassword) {
                showAlert('Las contraseñas no coinciden.');
                return;
            }

            if (password.length < 6) {
                showAlert('La contraseña debe tener al menos 6 caracteres.');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Creando cuenta...';
            hideAlert();

            try {
                // Create user
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Save user data to Firestore
                await addDoc(collection(db, 'usuarios'), {
                    uid: user.uid,
                    nombre: name,
                    email: email,
                    fecha_registro: serverTimestamp()
                });

                showAlert('¡Cuenta creada exitosamente!', 'success');
                
                // User will be redirected by onAuthStateChanged
            } catch (error) {
                console.error('Registration error:', error);
                let errorMessage = 'Error al crear la cuenta.';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'Este email ya está registrado.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Email inválido.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'La contraseña es muy débil.';
                        break;
                }

                showAlert(errorMessage);
            }

            registerBtn.disabled = false;
            registerBtn.textContent = 'Crear Cuenta';
        });

        // Make switchTab global for onclick
        window.switchTab = switchTab;
    </script>
</body>
</html>
