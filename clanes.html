<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clanes | BiciFastness</title>
    
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    </script>

    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-channeled/css/uicons-solid-channeled.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-straight/css/uicons-bold-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');
        
        :root { --bg-main: #121212; --bg-card: #1a1a1a; --bg-input: #222; --text-main: #f1efeb; --text-muted: #888; --border: #333; --primary: #0071c3; --nav-bg: rgba(10,10,10,0.9); }
        [data-theme="light"] { --bg-main: #f0f2f5; --bg-card: #ffffff; --bg-input: #f0f0f0; --text-main: #111; --text-muted: #555; --border: #ddd; --primary: #0071c3; --nav-bg: rgba(255,255,255,0.9); }

        body { margin: 0; padding: 0; padding-bottom: 70px; background-color: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; transition: all 0.3s;}

        nav { background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .brand { display: flex; align-items: center; text-decoration: none; color: var(--primary); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px;}
        .nav-right { display: flex; align-items: center; gap: 20px; line-height: 1; }
        nav .links { display: flex; align-items: center; }
        nav .links a { color: var(--text-muted); text-decoration: none; font-weight: 600; margin-left: 20px; transition: color 0.3s; }
        nav .links a.active, nav .links a:hover { color: var(--text-main); }
        .info-icon { color: var(--text-muted); font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; text-decoration: none; line-height: 0; margin-top: -3px; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted); border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* BUSCADOR */
        .search-container { margin-bottom: 20px; position: relative; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input { width: 100%; padding: 15px 15px 15px 45px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 1rem; transition: 0.3s;}
        
        .clan-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; transition: 0.3s; display: flex; justify-content: space-between; align-items: center;}
        .clan-card:hover { border-color: var(--primary); box-shadow: 0 8px 24px rgba(0,113,195,0.15); transform: translateY(-2px);}
        .clan-info { display: flex; align-items: center; gap: 15px; }
        .clan-shield { width: 55px; height: 55px; border-radius: 14px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .clan-shield i { display: flex; align-items: center; justify-content: center; line-height: 0; margin-top: 3px; }
        .clan-name { font-size: 1.25rem; font-weight: 800; margin: 0; color: var(--text-main); }
        .clan-stats { font-size: 0.85rem; color: var(--text-muted); margin: 5px 0 0 0; display: flex; gap: 15px; font-weight: 600;}
        .clan-actions { display: flex; gap: 10px; flex-direction: column;}

        .btn-join { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-join:hover:not(:disabled) { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-join:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-info { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-info:hover { background: var(--primary); color: white; }

        /* MI CLAN PANEL MEJORADO */
        .my-clan-header { position: relative; text-align: center; margin-bottom: 40px; padding: 40px 20px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: var(--bg-card);}
        .my-clan-bg-blur { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.1; filter: blur(40px); z-index: 0; }
        .my-clan-content-wrapper { position: relative; z-index: 1; }
        .my-clan-shield { width: 90px; height: 90px; border-radius: 24px; display: flex; justify-content: center; align-items: center; font-size: 3rem; color: white; margin: 0 auto 15px auto; box-shadow: 0 10px 20px rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1);}
        .my-clan-shield i { display: flex; line-height: 0; margin-top: 5px;}
        .my-clan-title { font-size: 2.2rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 1px;}
        .my-clan-motto { color: var(--text-muted); font-style: italic; font-size: 1rem; margin-top: 5px;}

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px;}
        .dash-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; transition: transform 0.3s, box-shadow 0.3s;}
        .dash-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); border-color: #444;}
        .dash-card h3 { margin: 0 0 20px 0; color: var(--primary); font-size: 1.1rem; display: flex; align-items: center; gap: 10px; font-weight: 800; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        
        .member-list { list-style: none; padding: 0; margin: 0; }
        .member-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.95rem; background: var(--bg-input); border-radius: 8px; margin-bottom: 8px;}
        .member-item:last-child { margin-bottom: 0; }
        .member-info-group { display: flex; align-items: center; gap: 10px; font-weight: 600;}
        .member-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--border); object-fit: cover; }
        .badge-leader { background: linear-gradient(135deg, #FFD700, #FFA500); padding: 2px 6px; border-radius: 6px; font-size: 0.65rem; color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 2px 5px rgba(255,215,0,0.3);}
        
        .admin-panel { border-color: var(--primary); background: rgba(0,113,195,0.03); }
        .request-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600;}
        .btn-icon { background: none; border: none; cursor: pointer; border-radius: 6px; padding: 6px 10px; transition: 0.2s; display: flex; align-items: center; justify-content: center;}
        .btn-icon.accept { color: #00C851; background: rgba(0,200,81,0.15); }
        .btn-icon.reject { color: #ff4444; background: rgba(255,68,68,0.15); }
        .btn-icon:hover { transform: scale(1.1); }

        .btn-danger-outline { width:100%; background:transparent; border:1px solid var(--border); color:#ff4444; padding:12px; border-radius:12px; font-weight:700; margin-top:20px; cursor:pointer; transition: 0.2s; }
        .btn-danger-outline:hover { border-color: #ff4444; background: rgba(255,68,68,0.1); }

        /* MODAL EXPLORAR MEJORADO */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background-color: var(--bg-card); margin: 5% auto; padding: 0; border: 1px solid var(--border); border-radius: 20px; width: 90%; max-width: 450px; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);}
        .modal-header-bg { height: 100px; width: 100%; position: absolute; top: 0; left: 0; z-index: 0; opacity: 0.2; }
        .close-modal { color: white; position: absolute; top: 15px; right: 20px; font-size: 28px; font-weight: bold; cursor: pointer; z-index: 10; background: rgba(0,0,0,0.5); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; line-height: 0;}
        .close-modal:hover { background: rgba(0,0,0,0.8); }
        .modal-body-inner { position: relative; z-index: 1; padding: 30px 25px; text-align: center; margin-top: 20px;}
        .modal-rating-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,215,0,0.1); border: 1px solid #FFD700; color: #FFD700; padding: 8px 15px; border-radius: 20px; font-weight: 800; font-size: 1.1rem; margin: 15px 0;}

        /* CREAR CLAN FORM */
        .create-form { background: var(--bg-card); padding: 25px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);}
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 700; text-transform: uppercase;}
        input[type="text"] { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        input[type="color"] { width: 100%; height: 45px; border: none; border-radius: 8px; cursor: pointer; background: transparent; padding: 0; }

        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; margin-top: 10px;}
        .icon-option { width: 45px; height: 45px; background: var(--bg-input); border: 2px solid var(--border); border-radius: 10px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.3rem; transition: 0.2s;}
        .icon-option i { display: flex; align-items: center; line-height: 0; margin-top: 2px;} 
        .icon-option.active { border-color: var(--primary); background: var(--primary); color: white;}
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 15px; transition: transform 0.2s;}
        .btn-submit:hover { transform: translateY(-2px); }

        .bottom-nav { display: none; }
        @media (max-width: 850px) { 
            nav .links { display: none; } 
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border); z-index: 1000; justify-content: space-between; padding: 8px 5px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); box-sizing: border-box;} 
            .bottom-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; text-align: center; } 
            .bottom-nav a.active { color: var(--primary); } 
            .bottom-nav a i { font-size: 1.25rem; line-height: 1; } 
        }
    </style>
</head>
<body>
    <nav>
        <a href="home.html" class="brand">BICIFASTNESS</a>
        <div class="nav-right">
            <div class="links">
                <a href="home.html">Inicio</a>
                <a href="ranking.html">Rankings</a>
                <a href="bicirating.html">BiciRating</a>
                <a href="mapa.html">Mapa</a>
                <a href="clanes.html" class="active">Clanes</a>
                <a href="subir.html">Subir</a>
                <a href="profile.html">Perfil</a>
            </div>
            <a href="info.html" class="info-icon"><i class="fi fi-bs-info"></i></a>
        </div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="tab-list">Explorar Clanes</button>
            <button class="tab-btn" id="tab-action">Fundar Clan</button> 
        </div>

        <div id="view-list">
            <div class="search-container">
                <i class="fi fi-br-search"></i>
                <input type="text" id="search-clan" class="search-input" placeholder="Buscar escuadrón...">
            </div>
            <div id="clans-container">Cargando clanes...</div>
        </div>

        <div id="view-create" class="create-form" style="display:none;">
            <h2 style="color:var(--primary); margin-top:0; font-weight: 900;">Funda tu Imperio</h2>
            <p style="font-size:0.9rem; color:var(--text-muted); margin-bottom: 25px;">Reúne hasta 5 corredores. Controla las calles. Sin coste de creación.</p>

            <div class="form-group"><label>Nombre de la Banda</label><input type="text" id="clan-name" placeholder="Ej: Los Ángeles del Asfalto" maxlength="20"></div>
            <div class="form-group"><label>Color Distintivo</label><input type="color" id="clan-color" value="#0071c3"></div>
            <div class="form-group"><label>Emblema</label><div class="icon-grid" id="icon-picker"></div></div>
            <div class="form-group"><label>Lema</label><input type="text" id="clan-motto" placeholder="Ej: Quemando rueda, no gasolina." maxlength="40"></div>
            
            <button class="btn-submit" id="btn-submit-clan">Forjar Alianza</button>
            <div id="create-msg" style="text-align:center; margin-top:15px; font-weight:600;"></div>
        </div>

        <div id="view-myclan" style="display:none;">
            <div id="myclan-content">Cargando tu cuartel general...</div>
        </div>
    </div>

    <div id="clan-modal" class="modal">
        <div class="modal-content">
            <div id="modal-header-color" class="modal-header-bg"></div>
            <span class="close-modal" id="close-modal">&times;</span>
            <div id="modal-body" class="modal-body-inner"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html"><i class="fi fi-sr-home"></i>Inicio</a>
        <a href="ranking.html"><i class="fi fi-sr-leaderboard"></i>Rankings</a>
        <a href="bicirating.html"><i class="fi fi-ss-medal"></i>Rating</a>
        <a href="subir.html"><i class="fi fi-sr-add"></i>Subir</a>
        <a href="mapa.html"><i class="fi fi-ss-map-marker"></i>Mapa</a>
        <a href="clanes.html" class="active"><i class="fi fi-sr-team-check-alt"></i>Clanes</a>
        <a href="profile.html"><i class="fi fi-sr-user"></i>Perfil</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk", authDomain: "bicifastness.firebaseapp.com", projectId: "bicifastness", messagingSenderId: "656116731421", appId: "1:656116731421:web:a4154d028fe9721c5800f4" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let currentUser = null;
        let myClanId = null;
        let allClanes = []; 

        // UI Tabs & Modal
        const tabList = document.getElementById('tab-list');
        const tabAction = document.getElementById('tab-action');
        const viewList = document.getElementById('view-list');
        const viewCreate = document.getElementById('view-create');
        const viewMyClan = document.getElementById('view-myclan');
        const modal = document.getElementById('clan-modal');

        tabList.onclick = () => {
            viewList.style.display = 'block'; viewCreate.style.display = 'none'; viewMyClan.style.display = 'none';
            tabList.classList.add('active'); tabAction.classList.remove('active');
        };
        tabAction.onclick = () => {
            viewList.style.display = 'none';
            tabList.classList.remove('active'); tabAction.classList.add('active');
            if(myClanId) { viewMyClan.style.display = 'block'; viewCreate.style.display = 'none'; } 
            else { viewCreate.style.display = 'block'; viewMyClan.style.display = 'none'; }
        };

        document.getElementById('close-modal').onclick = () => modal.style.display = "none";
        window.onclick = (e) => { if (e.target == modal) modal.style.display = "none"; };

        // ARRAY DE ICONOS 100% FUNCIONALES
        const icons = [
            '<i class="fi fi-ss-chess-queen"></i>', '<i class="fi fi-ss-crown"></i>', '<i class="fi fi-ss-dragon"></i>', '<i class="fi fi-br-ufo-beam"></i>     ',
            '<i class="fi fi-sr-tachometer-alt-fastest"></i>', '<i class="fi fi-sr-fort"></i>', '<i class="fi fi-sr-sunrise"></i>', '<i class="fi fi-bs-sword"></i>',
            '<i class="fi fi-sr-spade"></i>', '<i class="fi fi-sr-club"></i>', '<i class="fi fi-ss-heart"></i>', '<i class="fi fi-sr-heart-arrow"></i>',
            '<i class="fi fi-ss-bike"></i>', '<i class="fi fi-sr-beer"></i>', '<i class="fi fi-rs-martini-glass-citrus"></i>', '<i class="fi fi-sr-dice-alt"></i>',
            '<i class="fi fi-sr-gamepad"></i>', '<i class="fi fi-ss-user-ninja"></i>', '<i class="fi fi-ss-user-astronaut"></i>', '<i class="fi fi-ss-rocket-lunch"></i>',
            '<i class="fi fi-bs-car"></i>', '<i class="fi fi-sr-sack-dollar"></i>', '<i class="fi fi-ss-moon-stars"></i>', '<i class="fi fi-ss-flame"></i>', '<i class="fi fi-sr-bolt"></i>',
            '<i class="fi fi-ss-radiation"></i>', '<i class="fi fi-ss-diamond-exclamation"></i>', '<i class="fi fi-br-ban"></i>', '<i class="fi fi-sr-shield-xmark"></i>', '<i class="fi fi-sr-helmet-battle"></i>'
        ];
        
        const iconGrid = document.getElementById('icon-picker');
        let selectedIcon = icons[0]; 

        icons.forEach((ic, i) => {
            const div = document.createElement('div');
            div.className = 'icon-option' + (i === 0 ? ' active' : '');
            div.innerHTML = ic;
            div.onclick = () => {
                document.querySelectorAll('.icon-option').forEach(e => e.classList.remove('active'));
                div.classList.add('active'); selectedIcon = ic;
            };
            iconGrid.appendChild(div);
        });

        // Auth & Inicialización
        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = "index.html";
            else {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "usuarios", user.email));
                if(userDoc.exists()) myClanId = userDoc.data().clanId || null;
                
                if(myClanId) { tabAction.innerText = "Mi Clan"; loadMyClanData(); } 
                else { tabAction.innerText = "Fundar Clan"; }
                fetchClanes();
            }
        });

        const getAvatar = (email) => `https://api.dicebear.com/7.x/initials/svg?seed=${email}&backgroundColor=222`;

        // EXPLORAR CLANES
        async function fetchClanes() {
            const cSnap = await getDocs(collection(db, "clanes"));
            allClanes = [];
            cSnap.forEach(d => {
                let clanData = d.data(); clanData.id = d.id;
                if(!clanData.solicitudes) clanData.solicitudes = []; 
                allClanes.push(clanData);
            });
            renderClanes(allClanes);
        }

        function renderClanes(clanesArray) {
            const cContainer = document.getElementById('clans-container');
            cContainer.innerHTML = '';
            if(clanesArray.length === 0) { cContainer.innerHTML = '<p style="text-align:center; color:var(--text-muted);">No se encontraron clanes en la base de datos.</p>'; return; }

            clanesArray.forEach(clan => {
                const isFull = clan.miembros.length >= 5;
                const isMyClan = myClanId === clan.id;
                const isPending = clan.solicitudes.includes(currentUser.email);

                let btnJoinHtml = '';
                if(isMyClan) btnJoinHtml = `<button class="btn-join" disabled style="background:var(--primary); color:white; border:none;"><i class="fi fi-br-check"></i> Tu Clan</button>`;
                else if (isPending) btnJoinHtml = `<button class="btn-join" disabled><i class="fi fi-sr-time-quarter-to"></i> Pendiente</button>`;
                else if (isFull) btnJoinHtml = `<button class="btn-join" disabled><i class="fi fi-br-ban"></i> Lleno</button>`;
                else if (myClanId) btnJoinHtml = ``; 
                else btnJoinHtml = `<button class="btn-join join-btn-click" data-id="${clan.id}"><i class="fi fi-br-plus"></i> Unirse</button>`;

                cContainer.innerHTML += `
                    <div class="clan-card">
                        <div class="clan-info">
                            <div class="clan-shield" style="background: ${clan.color};">${clan.icono}</div>
                            <div>
                                <h3 class="clan-name">${clan.nombre}</h3>
                                <div class="clan-stats">
                                    <span><i class="fi fi-sr-users"></i> ${clan.miembros.length}/5</span> 
                                </div>
                            </div>
                        </div>
                        <div class="clan-actions">
                            <button class="btn-info info-btn-click" data-id="${clan.id}">Ver Ficha</button>
                            ${btnJoinHtml}
                        </div>
                    </div>
                `;
            });

            document.querySelectorAll('.join-btn-click').forEach(btn => {
                btn.onclick = async (e) => {
                    const clanIdToJoin = e.target.getAttribute('data-id');
                    e.target.disabled = true; e.target.innerHTML = "<i class='fi fi-sr-spinner-alt'></i>...";
                    try {
                        await updateDoc(doc(db, "clanes", clanIdToJoin), { solicitudes: arrayUnion(currentUser.email) });
                        fetchClanes(); 
                    } catch(err) { alert("Error al solicitar."); fetchClanes(); }
                }
            });

            document.querySelectorAll('.info-btn-click').forEach(btn => {
                btn.onclick = (e) => {
                    const c = allClanes.find(x => x.id === e.target.getAttribute('data-id'));
                    document.getElementById('modal-header-color').style.background = `linear-gradient(to bottom, ${c.color}, transparent)`;
                    const membersHtml = c.miembros.map(m => `
                        <li class="member-item" style="border:none; padding:8px 0; background:transparent;">
                            <div class="member-info-group">
                                <img src="${getAvatar(m)}" class="member-avatar">
                                <span>${m.split('@')[0]}</span>
                                ${c.admin===m ? '<span class="badge-leader">Líder</span>' : ''}
                            </div>
                        </li>
                    `).join('');
                    
                    document.getElementById('modal-body').innerHTML = `
                        <div class="clan-shield" style="background:${c.color}; margin: 0 auto 15px auto; width: 70px; height: 70px; font-size: 2rem;">${c.icono}</div>
                        <h2 style="margin:0; color:var(--text-main); font-weight:900; text-transform:uppercase;">${c.nombre}</h2>
                        <p style="color:var(--text-muted); font-style:italic; font-size:0.95rem; margin-top:5px;">"${c.lema}"</p>
                        
                        <div style="background:var(--bg-input); padding:20px; border-radius:12px; margin-top: 20px;">
                            <h4 style="text-align:left; color:var(--text-muted); margin:0 0 10px 0; text-transform:uppercase; font-size:0.8rem;">Escuadrón (${c.miembros.length}/5)</h4>
                            <ul class="member-list" style="text-align:left;">${membersHtml}</ul>
                        </div>
                    `;
                    modal.style.display = "block";
                }
            });
        }

        document.getElementById('search-clan').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderClanes(allClanes.filter(c => c.nombre.toLowerCase().includes(q)));
        });

        // ------------------ LÓGICA DE TERRITORIOS DINÁMICOS ------------------
        
        async function getUserClan(email) {
            const userDoc = await getDoc(doc(db, "usuarios", email));
            return userDoc.exists() ? (userDoc.data().clanId || null) : null;
        }

        async function recalcularEstacion(numEstacion) {
            const qAll = query(collection(db, "tiempos_viaje"), where("verificado", "==", true));
            const snap = await getDocs(qAll);

            let viajesPorRuta = {};
            snap.forEach(d => {
                const data = d.data();
                const parts = data.ruta.split('-');
                const orig = parts[0].replace(/^0+/, '') || "0";
                const dest = parts[1].replace(/^0+/, '') || "0";

                if (orig === numEstacion || dest === numEstacion) {
                    if (!viajesPorRuta[data.ruta]) viajesPorRuta[data.ruta] = [];
                    viajesPorRuta[data.ruta].push(data);
                }
            });

            let puntosClan = {};

            for (const [ruta, viajes] of Object.entries(viajesPorRuta)) {
                viajes.sort((a,b) => a.tiempo_segundos - b.tiempo_segundos);
                const top10 = viajes.slice(0, 10);

                for (let i = 0; i < top10.length; i++) {
                    const clanId = await getUserClan(top10[i].email_real);
                    if (clanId) {
                        let pts = 0;
                        if (i === 0) pts = 7;
                        else if (i === 1) pts = 5;
                        else if (i === 2) pts = 3;
                        else if (i >= 3 && i <= 9) pts = 1;

                        puntosClan[clanId] = (puntosClan[clanId] || 0) + pts;
                    }
                }
            }

            let dominante = null;
            let maxPts = 0;
            let sumTotal = 0;
            for (const [clan, pts] of Object.entries(puntosClan)) {
                sumTotal += pts;
                if (pts > maxPts) { maxPts = pts; dominante = clan; }
            }

            await setDoc(doc(db, "estaciones_stats", numEstacion), {
                clan_dominante: dominante,
                total_puntos: sumTotal,
                puntos_detalle: puntosClan
            }, { merge: true });
        }

        // Esta función se ejecuta siempre que un usuario cambia de clan (fichajes, abandonos, etc)
        async function updateUserTerritories(email) {
            const qUserTrips = query(collection(db, "tiempos_viaje"), where("email_real", "==", email), where("verificado", "==", true));
            const snap = await getDocs(qUserTrips);
            
            let stationsToUpdate = new Set();
            snap.forEach(doc => {
                const data = doc.data();
                const parts = data.ruta.split('-');
                stationsToUpdate.add(parts[0].replace(/^0+/, '') || "0");
                stationsToUpdate.add(parts[1].replace(/^0+/, '') || "0");
            });

            for (let stationNum of stationsToUpdate) {
                await recalcularEstacion(stationNum);
            }
        }


        // PANEL MI CLAN
        async function loadMyClanData() {
            if(!myClanId) return;
            const docSnap = await getDoc(doc(db, "clanes", myClanId));
            if(!docSnap.exists()) return;
            const clan = docSnap.data();
            const isClanLeader = clan.admin === currentUser.email;

            // Calcular Cuántas estaciones domina este clan
            const qStats = await getDocs(query(collection(db, "estaciones_stats"), where("clan_dominante", "==", myClanId)));
            const estacionesConquistadas = qStats.size;

            let membersList = '';
            clan.miembros.forEach(m => {
                let badge = m === clan.admin ? '<span class="badge-leader">Líder</span>' : '';
                let kickBtn = (isClanLeader && m !== currentUser.email) ? `<button class="btn-icon reject" onclick="window.kickUser('${m}')" title="Expulsar"><i class="fi fi-br-cross"></i></button>` : '';
                membersList += `
                    <li class="member-item">
                        <div class="member-info-group">
                            <img src="${getAvatar(m)}" class="member-avatar">
                            <span>${m.split('@')[0]}</span> 
                            ${badge}
                        </div> 
                        ${kickBtn}
                    </li>`;
            });

            let adminHtml = '';
            if(isClanLeader && clan.solicitudes && clan.solicitudes.length > 0) {
                adminHtml = `
                    <div class="dash-card admin-panel">
                        <h3><i class="fi fi-sr-envelope-open"></i> Solicitudes Pendientes</h3>
                        <p style="font-size:0.8rem; color:var(--text-muted); margin-top:-10px;">Elige a los mejores para tu escuadrón.</p>`;
                
                clan.solicitudes.forEach(req => {
                    adminHtml += `
                        <div class="request-item">
                            <div class="member-info-group">
                                <img src="${getAvatar(req)}" class="member-avatar">
                                <span>${req.split('@')[0]}</span>
                            </div>
                            <div>
                                <button class="btn-icon accept" onclick="window.acceptUser('${req}')" title="Aceptar"><i class="fi fi-br-check"></i></button>
                                <button class="btn-icon reject" onclick="window.rejectUser('${req}')" title="Rechazar"><i class="fi fi-br-cross"></i></button>
                            </div>
                        </div>`;
                });
                adminHtml += `</div>`;
            }

            let leaveHtml = !isClanLeader ? `<button class="btn-danger-outline" onclick="window.leaveClan()"><i class="fi fi-br-exit"></i> Abandonar Clan</button>` : '';

            document.getElementById('myclan-content').innerHTML = `
                <div class="my-clan-header">
                    <div class="my-clan-bg-blur" style="background:${clan.color};"></div>
                    <div class="my-clan-content-wrapper">
                        <div class="my-clan-shield" style="background:${clan.color};">${clan.icono}</div>
                        <h2 class="my-clan-title">${clan.nombre}</h2>
                        <p class="my-clan-motto">"${clan.lema}"</p>
                    </div>
                </div>
                
                <div class="dashboard-grid">
                    <div class="dash-card">
                        <h3><i class="fi fi-sr-users"></i> Miembros (${clan.miembros.length}/5)</h3>
                        <ul class="member-list">${membersList}</ul>
                    </div>
                    <div class="dash-card">
                        <h3><i class="fi fi-ss-map-marker"></i> Territorio</h3>
                        <p style="color:var(--text-muted); font-size:0.9rem;">Zonas conquistadas en la ciudad.</p>
                        <div style="font-size:3rem; font-weight:900; color:var(--primary); line-height:1; margin-top:10px;">${estacionesConquistadas} <i class="fi fi-sr-flag" style="font-size:1.5rem; color:var(--primary);"></i></div>
                    </div>
                    ${adminHtml}
                </div>
                ${leaveHtml}
            `;
        }

        // FUNCIONES ADMIN / MIEMBRO
        // FUNCIONES ADMIN / MIEMBRO
        window.acceptUser = async (userEmail) => {
            try {
                // 1. COMPROBACIÓN DE SEGURIDAD: ¿Ya tiene clan?
                const userRef = doc(db, "usuarios", userEmail);
                const userDoc = await getDoc(userRef);
                
                if (userDoc.exists() && userDoc.data().clanId !== null) {
                    // Si ya tiene clan, le avisamos al líder y borramos la solicitud obsoleta
                    alert(`¡Demasiado tarde! ${userEmail.split('@')[0]} ya se unió a otro escuadrón mientras esperaba.`);
                    await updateDoc(doc(db, "clanes", myClanId), { solicitudes: arrayRemove(userEmail) });
                    loadMyClanData(); 
                    fetchClanes();
                    return; // Detenemos la función aquí para que no entre en este clan
                }

                // 2. Si está libre, lo metemos en el clan
                await updateDoc(doc(db, "clanes", myClanId), { 
                    solicitudes: arrayRemove(userEmail), 
                    miembros: arrayUnion(userEmail) 
                });
                await updateDoc(userRef, { clanId: myClanId });
                
                // 3. Mover su influencia territorial (Recalcular estaciones)
                await updateUserTerritories(userEmail);
                
                alert(`Has reclutado a ${userEmail.split('@')[0]} con éxito.`); 
                loadMyClanData(); 
                fetchClanes();
            } catch (e) { 
                alert("Error al aceptar usuario: " + e.message); 
            }
        };
        
        window.rejectUser = async (userEmail) => {
            try { await updateDoc(doc(db, "clanes", myClanId), { solicitudes: arrayRemove(userEmail) }); loadMyClanData(); fetchClanes(); } catch (e) {}
        };
        
        window.kickUser = async (userEmail) => {
            if(!confirm(`¿Expulsar a ${userEmail}? Sus puntos se restarán del territorio de tu clan.`)) return;
            try {
                // 1. Quitar el clan
                await updateDoc(doc(db, "clanes", myClanId), { miembros: arrayRemove(userEmail) });
                await updateDoc(doc(db, "usuarios", userEmail), { clanId: null });
                
                // 2. Mover su influencia territorial (Recalcular estaciones)
                await updateUserTerritories(userEmail);
                
                loadMyClanData(); fetchClanes();
            } catch (e) { alert("Error al expulsar."); }
        };
        
        window.leaveClan = async () => {
            if(!confirm("¿Abandonar el clan? Tus puntos de territorio se irán contigo.")) return;
            try {
                const myEmail = currentUser.email;
                await updateDoc(doc(db, "clanes", myClanId), { miembros: arrayRemove(myEmail) });
                await updateDoc(doc(db, "usuarios", myEmail), { clanId: null });
                
                await updateUserTerritories(myEmail);
                
                window.location.reload();
            } catch(e) {}
        };

        // FUNDAR CLAN
        document.getElementById('btn-submit-clan').onclick = async () => {
            const name = document.getElementById('clan-name').value.trim();
            const color = document.getElementById('clan-color').value;
            const motto = document.getElementById('clan-motto').value.trim();
            const msg = document.getElementById('create-msg');
            if(!name || !motto) { msg.innerText = "Rellena todos los campos."; msg.style.color = "red"; return; }

            const newClanId = name.replace(/\s+/g, '_').toLowerCase();
            try {
                const checkDoc = await getDoc(doc(db, "clanes", newClanId));
                if(checkDoc.exists()) { msg.innerText = "Nombre en uso."; msg.style.color = "red"; return; }

                msg.innerText = "Fundando imperio..."; msg.style.color = "var(--primary)";
                await setDoc(doc(db, "clanes", newClanId), {
                    nombre: name, color: color, icono: selectedIcon, lema: motto,
                    admin: currentUser.email, miembros: [currentUser.email], solicitudes: [], biciRating: 0
                });
                await updateDoc(doc(db, "usuarios", currentUser.email), { clanId: newClanId });
                
                // Mover tu influencia al nuevo clan recién creado
                await updateUserTerritories(currentUser.email);
                
                window.location.reload();
            } catch(e) { msg.innerText = "Error de conexión."; msg.style.color = "red"; }
        };
    </script>
</body>
