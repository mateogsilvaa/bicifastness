<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clanes | BiciFastness</title>
    
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    </script>

    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-channeled/css/uicons-solid-channeled.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-straight/css/uicons-bold-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root { --bg-main: #121212; --bg-card: #1a1a1a; --bg-input: #222; --text-main: #f1efeb; --text-muted: #888; --border: #333; --primary: #0071c3; --nav-bg: rgba(10,10,10,0.9); }
        [data-theme="light"] { --bg-main: #f0f2f5; --bg-card: #ffffff; --bg-input: #f0f0f0; --text-main: #111; --text-muted: #555; --border: #ddd; --primary: #0071c3; --nav-bg: rgba(255,255,255,0.9); }

        body { margin: 0; padding: 0; padding-bottom: 70px; background-color: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; transition: all 0.3s;}

        nav { background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .brand { display: flex; align-items: center; text-decoration: none; color: var(--primary); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px;}
        .nav-right { display: flex; align-items: center; gap: 20px; line-height: 1; }
        nav .links { display: flex; align-items: center; }
        nav .links a { color: var(--text-muted); text-decoration: none; font-weight: 600; margin-left: 20px; transition: color 0.3s; }
        nav .links a.active, nav .links a:hover { color: var(--text-main); }
        .info-icon { color: var(--text-muted); font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; text-decoration: none; line-height: 0; margin-top: -3px; }
        .info-icon:hover { color: var(--primary); }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-muted); border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* BUSCADOR */
        .search-container { margin-bottom: 20px; position: relative; }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input { width: 100%; padding: 15px 15px 15px 45px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 1rem; transition: 0.3s;}
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,113,195,0.1); }

        .clan-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; transition: 0.3s;}
        .clan-card:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(0,113,195,0.1); }
        .clan-header { display: flex; align-items: center; justify-content: space-between; }
        .clan-info { display: flex; align-items: center; gap: 15px; }
        .clan-shield { width: 50px; height: 50px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: white; font-weight: 900; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .clan-name { font-size: 1.2rem; font-weight: 800; margin: 0; color: var(--text-main); }
        .clan-stats { font-size: 0.85rem; color: var(--text-muted); margin: 5px 0 0 0; display: flex; gap: 15px;}

        .btn-join { background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-join:hover:not(:disabled) { background: var(--primary); color: white; border-color: var(--primary); transform: scale(1.05); }
        .btn-join:disabled { opacity: 0.5; cursor: not-allowed; }

        /* SOLICITUDES ADMINISTRADOR */
        .admin-panel { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); }
        .admin-panel h4 { margin: 0 0 10px 0; color: var(--primary); font-size: 0.9rem; text-transform: uppercase;}
        .request-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-input); padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 0.85rem;}
        .btn-icon { background: none; border: none; cursor: pointer; border-radius: 4px; padding: 5px 8px; transition: 0.2s; }
        .btn-icon.accept { color: #00C851; background: rgba(0,200,81,0.1); }
        .btn-icon.reject { color: #ff4444; background: rgba(255,68,68,0.1); }
        .btn-icon:hover { transform: scale(1.1); }

        /* CREAR CLAN FORM */
        .create-form { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); display: none; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 700; text-transform: uppercase;}
        input[type="text"] { width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        input[type="text"]:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,113,195,0.1); }
        input[type="color"] { width: 100%; height: 40px; border: none; border-radius: 8px; cursor: pointer; background: transparent; padding: 0; }

        .icon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 10px; margin-top: 10px;}
        .icon-option { width: 40px; height: 40px; background: var(--bg-input); border: 2px solid var(--border); border-radius: 8px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1.2rem; transition: 0.2s;}
        .icon-option:hover { border-color: var(--primary); transform: scale(1.1); }
        .icon-option.active { border-color: var(--primary); background: var(--primary); color: white;}

        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-submit:hover { background: #005a9e; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,113,195,0.3); }

        .bottom-nav { display: none; }
        @media (max-width: 850px) { 
            nav .links { display: none; } 
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border); z-index: 1000; justify-content: space-between; padding: 8px 5px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); box-sizing: border-box;} 
            .bottom-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; text-align: center; } 
            .bottom-nav a.active { color: var(--primary); } 
            .bottom-nav a i { font-size: 1.25rem; line-height: 1; } 
        }
    </style>
</head>
<body>
    <nav>
        <a href="home.html" class="brand">BICIFASTNESS</a>
        <div class="nav-right">
            <div class="links">
                <a href="home.html">Inicio</a>
                <a href="ranking.html">Rankings</a>
                <a href="bicirating.html">BiciRating</a>
                <a href="mapa.html">Mapa</a>
                <a href="clanes.html" class="active">Clanes</a>
                <a href="subir.html">Subir</a>
                <a href="profile.html">Perfil</a>
            </div>
            <a href="info.html" class="info-icon" title="Cómo funciona"><i class="fi fi-bs-info"></i></a>
        </div>
    </nav>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="tab-list">Explorar Clanes</button>
            <button class="tab-btn" id="tab-create">Fundar Clan</button>
        </div>

        <div id="view-list">
            <div class="search-container">
                <i class="fi fi-br-search"></i>
                <input type="text" id="search-clan" class="search-input" placeholder="Buscar clan por nombre...">
            </div>

            <div id="clans-container">Cargando clanes...</div>
        </div>

        <div id="view-create" class="create-form">
            <h2 style="color:var(--primary); margin-top:0;">Funda tu Imperio</h2>
            <p style="font-size:0.9rem; color:var(--text-muted);">Máximo 5 personas. Fundar clan es gratis.</p>

            <div class="form-group">
                <label>Nombre del Clan</label>
                <input type="text" id="clan-name" placeholder="Ej: Los Ángeles del Asfalto" maxlength="20">
            </div>
            <div class="form-group">
                <label>Color Dominante (Hex)</label>
                <input type="color" id="clan-color" value="#0071c3">
            </div>
            <div class="form-group">
                <label>Emblema</label>
                <div class="icon-grid" id="icon-picker"></div>
            </div>
            <div class="form-group">
                <label>Lema</label>
                <input type="text" id="clan-motto" placeholder="Ej: Quemando rueda, no gasolina." maxlength="40">
            </div>
            <button class="btn-submit" id="btn-submit-clan">Fundar Clan</button>
            <div id="create-msg" style="text-align:center; margin-top:10px; font-weight:600;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="home.html"><i class="fi fi-sr-home"></i>Inicio</a>
        <a href="ranking.html"><i class="fi fi-sr-ranking-star"></i>Rankings</a>
        <a href="bicirating.html"><i class="fi fi-sr-leaderboard-trophy"></i>Rating</a>
        <a href="subir.html"><i class="fi fi-sr-add"></i>Subir</a>
        <a href="mapa.html"><i class="fi fi-ss-map-marker"></i>Mapa</a>
        <a href="clanes.html" class="active"><i class="fi fi-sr-team-check-alt"></i>Clanes</a>
        <a href="profile.html"><i class="fi fi-sr-user"></i>Perfil</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk", authDomain: "bicifastness.firebaseapp.com", projectId: "bicifastness", messagingSenderId: "656116731421", appId: "1:656116731421:web:a4154d028fe9721c5800f4" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let currentUser = null;
        let myClanId = null;
        let allClanes = []; // Array para guardar todos y poder buscar

        // UI Tabs
        document.getElementById('tab-list').onclick = () => {
            document.getElementById('view-list').style.display = 'block'; document.getElementById('view-create').style.display = 'none';
            document.getElementById('tab-list').classList.add('active'); document.getElementById('tab-create').classList.remove('active');
        };
        document.getElementById('tab-create').onclick = () => {
            document.getElementById('view-list').style.display = 'none'; document.getElementById('view-create').style.display = 'block';
            document.getElementById('tab-create').classList.add('active'); document.getElementById('tab-list').classList.remove('active');
        };

        // Rellenar Grid de Iconos
        const icons = [
            '<i class="fi fi-ss-chess-queen"></i>', '<i class="fi fi-ss-crown"></i>', '<i class="fi fi-ss-dragon"></i>', '<i class="fi fi-sr-dragon-fire"></i>',
            '<i class="fi fi-ss-lion"></i>', '<i class="fi fi-ss-sea-wave"></i>', '<i class="fi fi-sr-sunrise"></i>', '<i class="fi fi-bs-sword"></i>',
            '<i class="fi fi-sr-spade"></i>', '<i class="fi fi-sr-clubs"></i>', '<i class="fi fi-ss-heart"></i>', '<i class="fi fi-sr-heart-arrow"></i>',
            '<i class="fi fi-ss-bike"></i>', '<i class="fi fi-sr-beer"></i>', '<i class="fi fi-rs-martini-glass-citrus"></i>', '<i class="fi fi-sr-dice-alt"></i>',
            '<i class="fi fi-sr-gamepad"></i>', '<i class="fi fi-ss-user-ninja"></i>', '<i class="fi fi-ss-user-astronaut"></i>', '<i class="fi fi-ss-rocket-launch"></i>',
            '<i class="fi fi-bs-car"></i>', '<i class="fi fi-sr-sack-dollar"></i>', '<i class="fi fi-ss-moon-stars"></i>', '<i class="fi fi-ss-flame"></i>',
            '<i class="fi fi-ss-radiation"></i>', '<i class="fi fi-ss-diamond-exclamation"></i>', '<i class="fi fi-br-ban"></i>', '<i class="fi fi-sr-shield-xmark"></i>'
        ];
        const iconGrid = document.getElementById('icon-picker');
        let selectedIcon = icons[1]; // Crown por defecto

        icons.forEach((ic, i) => {
            const div = document.createElement('div');
            div.className = 'icon-option' + (i === 1 ? ' active' : '');
            div.innerHTML = ic;
            div.onclick = () => {
                document.querySelectorAll('.icon-option').forEach(e => e.classList.remove('active'));
                div.classList.add('active');
                selectedIcon = ic;
            };
            iconGrid.appendChild(div);
        });

        // Auth
        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = "index.html";
            else {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "usuarios", user.email));
                if(userDoc.exists()) myClanId = userDoc.data().clanId || null;
                fetchClanes();
            }
        });

        // Buscar Clanes desde Firebase y guardarlos
        async function fetchClanes() {
            const cSnap = await getDocs(collection(db, "clanes"));
            allClanes = [];
            cSnap.forEach(d => {
                let clanData = d.data();
                clanData.id = d.id;
                // Aseguramos que existe el array de solicitudes
                if(!clanData.solicitudes) clanData.solicitudes = []; 
                allClanes.push(clanData);
            });
            renderClanes(allClanes);
        }

        // Renderizar HTML de clanes
        function renderClanes(clanesArray) {
            const cContainer = document.getElementById('clans-container');
            cContainer.innerHTML = '';

            if(clanesArray.length === 0) {
                cContainer.innerHTML = '<p style="text-align:center; color:var(--text-muted);">No se encontraron clanes.</p>';
                return;
            }

            clanesArray.forEach(clan => {
                const isFull = clan.miembros.length >= 5;
                const isMyClan = myClanId === clan.id;
                const isPending = clan.solicitudes.includes(currentUser.email);
                const isAdmin = clan.admin === currentUser.email;

                let btnHtml = '';
                if(isMyClan) {
                    btnHtml = `<button class="btn-join" disabled style="background:var(--primary); color:white; border:none;">Tu Clan</button>`;
                } else if (isPending) {
                    btnHtml = `<button class="btn-join" disabled>Pendiente...</button>`;
                } else if (isFull) {
                    btnHtml = `<button class="btn-join" disabled>Lleno</button>`;
                } else if (myClanId) {
                    btnHtml = `<button class="btn-join" disabled title="Ya tienes un clan">Unirse</button>`; 
                } else {
                    btnHtml = `<button class="btn-join join-btn-click" data-id="${clan.id}">Solicitar Unión</button>`;
                }

                // Panel de solicitudes solo para el Admin
                let adminPanel = '';
                if (isAdmin && clan.solicitudes.length > 0) {
                    adminPanel = `<div class="admin-panel"><h4>Solicitudes Pendientes:</h4>`;
                    clan.solicitudes.forEach(reqEmail => {
                        adminPanel += `
                            <div class="request-item">
                                <span>${reqEmail}</span>
                                <div>
                                    <button class="btn-icon accept" onclick="window.acceptUser('${clan.id}', '${reqEmail}')"><i class="fi fi-br-check"></i></button>
                                    <button class="btn-icon reject" onclick="window.rejectUser('${clan.id}', '${reqEmail}')"><i class="fi fi-br-cross"></i></button>
                                </div>
                            </div>
                        `;
                    });
                    adminPanel += `</div>`;
                }

                cContainer.innerHTML += `
                    <div class="clan-card">
                        <div class="clan-header">
                            <div class="clan-info">
                                <div class="clan-shield" style="background: ${clan.color};">${clan.icono}</div>
                                <div>
                                    <h3 class="clan-name">${clan.nombre}</h3>
                                    <div class="clan-stats">
                                        <span><i class="fi fi-sr-users"></i> ${clan.miembros.length}/5</span> 
                                        <span><i class="fi fi-sr-star"></i> BR: ${clan.biciRating || 0}</span>
                                    </div>
                                    <div style="font-size:0.75rem; color:var(--text-muted); margin-top:2px;">"${clan.lema}"</div>
                                </div>
                            </div>
                            ${btnHtml}
                        </div>
                        ${adminPanel}
                    </div>
                `;
            });

            // Asignar evento al botón de solicitar
            document.querySelectorAll('.join-btn-click').forEach(btn => {
                btn.onclick = async (e) => {
                    const clanIdToJoin = e.target.getAttribute('data-id');
                    e.target.disabled = true; e.target.innerText = "Enviando...";
                    try {
                        // Añadir a "solicitudes" en lugar de "miembros"
                        await updateDoc(doc(db, "clanes", clanIdToJoin), { solicitudes: arrayUnion(currentUser.email) });
                        alert("Solicitud enviada al líder del clan.");
                        fetchClanes(); // Recargar
                    } catch(err) {
                        alert("Error al enviar solicitud."); e.target.innerText = "Solicitar Unión"; e.target.disabled = false;
                    }
                }
            });
        }

        // Lógica del Buscador
        document.getElementById('search-clan').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtrados = allClanes.filter(c => c.nombre.toLowerCase().includes(query));
            renderClanes(filtrados);
        });

        // Funciones Globales para Aceptar/Rechazar usuarios (Panel de Administrador)
        window.acceptUser = async (clanId, userEmail) => {
            try {
                // Quitamos de solicitudes y metemos en miembros
                await updateDoc(doc(db, "clanes", clanId), { 
                    solicitudes: arrayRemove(userEmail),
                    miembros: arrayUnion(userEmail)
                });
                // Actualizamos el perfil del usuario para que sepa que tiene clan
                await updateDoc(doc(db, "usuarios", userEmail), { clanId: clanId });
                alert(`${userEmail} ha sido aceptado en el clan.`);
                fetchClanes();
            } catch (e) { alert("Error al aceptar usuario: " + e.message); }
        };

        window.rejectUser = async (clanId, userEmail) => {
            try {
                // Solo quitamos de solicitudes
                await updateDoc(doc(db, "clanes", clanId), { 
                    solicitudes: arrayRemove(userEmail)
                });
                fetchClanes();
            } catch (e) { alert("Error al rechazar usuario."); }
        };

        // Crear Clan
        document.getElementById('btn-submit-clan').onclick = async () => {
            if(myClanId) { alert("Ya perteneces a un clan. Abandónalo para fundar uno nuevo."); return; }

            const name = document.getElementById('clan-name').value.trim();
            const color = document.getElementById('clan-color').value;
            const motto = document.getElementById('clan-motto').value.trim();
            const msg = document.getElementById('create-msg');

            if(!name || !motto) { msg.innerText = "Rellena nombre y lema."; msg.style.color = "red"; return; }

            // Creamos un ID seguro para el clan
            const newClanId = name.replace(/\s+/g, '_').toLowerCase();

            try {
                msg.innerText = "Comprobando disponibilidad..."; msg.style.color = "var(--primary)";
                const checkDoc = await getDoc(doc(db, "clanes", newClanId));
                if(checkDoc.exists()) { msg.innerText = "Ese nombre ya existe."; msg.style.color = "red"; return; }

                msg.innerText = "Fundando clan...";
                await setDoc(doc(db, "clanes", newClanId), {
                    nombre: name, color: color, icono: selectedIcon, lema: motto,
                    admin: currentUser.email, miembros: [currentUser.email], solicitudes: [], biciRating: 0
                });

                await updateDoc(doc(db, "usuarios", currentUser.email), { clanId: newClanId });

                alert("¡Has fundado tu imperio con éxito!");
                window.location.reload();
            } catch(e) {
                msg.innerText = "Error (Revisa los permisos de Firestore): " + e.message; msg.style.color = "red";
            }
        };
    </script>
</body>
</html>
