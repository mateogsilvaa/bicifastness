<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiciFastness - Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
        
        body { margin: 0; padding: 0; background-color: #121212; color: #f1efeb; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-image: radial-gradient(circle at 50% 0%, #1a2a3a 0%, #121212 60%); }
        .card { background: #1a1a1a; padding: 2.5rem 2rem; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 100%; max-width: 350px; text-align: center; }
        h1 { color: #0071c3; margin-top: 0; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        h3 { margin-top: 0; color: #888; font-weight: 400; font-size: 0.9rem; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; font-family: inherit; transition: border 0.3s; }
        input:focus { border-color: #0071c3; outline: none; }
        button { width: 100%; padding: 14px; margin-top: 15px; background: #0071c3; color: white; border: none; border-radius: 6px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #005a9e; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .toggle { margin-top: 20px; font-size: 0.85em; }
        .toggle a { color: #888; text-decoration: none; transition: color 0.3s; }
        .toggle a:hover { color: #f1efeb; }
        #error-msg { color: #ff4444; font-size: 0.85em; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>BiciFastness</h1>
        <h3>Iniciar Sesión</h3>
        
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        
        <button id="action-btn">Entrar</button>
        <div id="error-msg"></div>
        
        <div class="toggle">
            <a href="register.html">¿No tienes cuenta? Regístrate aquí</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk",
            authDomain: "bicifastness.firebaseapp.com",
            projectId: "bicifastness",
            storageBucket: "bicifastness.appspot.com",
            messagingSenderId: "656116731421",
            appId: "1:656116731421:web:a4154d028fe9721c5800f4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = "home.html";
        });

        const btn = document.getElementById('action-btn');
        const errorMsg = document.getElementById('error-msg');

        btn.addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value;
            errorMsg.innerText = "";

            if(!email || !pass) {
                errorMsg.innerText = "Rellena todos los campos, por favor.";
                return;
            }

            try {
                btn.innerText = "Cargando...";
                btn.disabled = true;
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "Entrar";
                if(error.code === 'auth/invalid-credential') errorMsg.innerText = "Correo o contraseña incorrectos.";
                else if(error.code === 'auth/invalid-email') errorMsg.innerText = "El formato del correo no es válido.";
                else errorMsg.innerText = "Error: " + error.message;
            }
        });
    </script>
</body>
</html>
