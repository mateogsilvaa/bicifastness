<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiciFastness - Subir Tiempo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #000000;
            --accent-blue: #0071c3;
            --accent-cream: #f1efeb;
            --text-primary: #ffffff;
            --text-secondary: #f1efeb;
            --border-color: #333333;
            --card-bg: #1a1a1a;
            --hover-bg: #2a2a2a;
            --success: #28a745;
            --error: #dc3545;
            --warning: #ffc107;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        /* Navigation */
        nav {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .nav-logo {
            width: 40px;
            height: 40px;
            background: var(--accent-blue);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-weight: 800;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--accent-blue);
        }

        .logout-btn {
            background: var(--accent-blue);
            color: var(--text-primary);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #005a9e;
            transform: translateY(-1px);
        }

        /* Main Content */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* Upload Form */
        .upload-section {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input, select {
            width: 100%;
            padding: 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(0, 113, 195, 0.2);
        }

        input::placeholder, select::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* Time Input Group */
        .time-input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        /* Route Search */
        .route-search-container {
            position: relative;
        }

        .route-search-input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .route-search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(0, 113, 195, 0.2);
        }

        .route-search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .route-search-results.show {
            display: block;
        }

        .route-option {
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .route-option:last-child {
            border-bottom: none;
        }

        .route-option:hover {
            background: var(--hover-bg);
        }

        /* File Upload */
        .file-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            background: var(--bg-primary);
        }

        .file-upload-area:hover {
            border-color: var(--accent-blue);
            background: rgba(0, 113, 195, 0.05);
        }

        .file-upload-area.drag-over {
            border-color: var(--accent-blue);
            background: rgba(0, 113, 195, 0.1);
            transform: scale(1.02);
        }

        .file-upload-area.has-file {
            border-color: var(--success);
            background: rgba(40, 167, 69, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .upload-text {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            color: var(--text-secondary);
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .file-info {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0, 113, 195, 0.1);
            border-radius: 8px;
            border: 1px solid var(--accent-blue);
        }

        .file-name {
            color: var(--text-primary);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .file-size {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .remove-file-btn {
            background: var(--error);
            color: var(--text-primary);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
        }

        .remove-file-btn:hover {
            background: #c82333;
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 1rem;
            display: none;
        }

        .progress-container.show {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-blue);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            margin-top: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Buttons */
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: var(--text-primary);
            width: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            background: #005a9e;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 113, 195, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Messages */
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .message.error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
        }

        .message.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                gap: 1rem;
            }

            .nav-links a:not(.logout-btn) {
                display: none;
            }

            main {
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .time-input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-brand">
            <div class="nav-logo">🚴</div>
            <span>BiciFastness</span>
        </div>
        <div class="nav-links">
            <a href="ranking.html">Rankings</a>
            <a href="subir.html">Subir Tiempo</a>
            <a href="profile.html">Mi Perfil</a>
            <a href="admin.html">Admin</a>
            <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <h1>Subir Tiempo</h1>
            <p class="page-subtitle">Registra tu mejor tiempo y compite con otros ciclistas</p>
        </div>

        <div class="upload-section">
            <div class="message success" id="successMessage">
                ¡Tiempo subido correctamente! Esperando verificación.
            </div>
            <div class="message error" id="errorMessage"></div>

            <form id="uploadForm">
                <div class="form-group">
                    <label for="routeSearch">Ruta *</label>
                    <div class="route-search-container">
                        <input 
                            type="text" 
                            id="routeSearch" 
                            class="route-search-input" 
                            placeholder="Buscar o escribir ruta (ej: 180-235)"
                            required
                            autocomplete="off"
                        >
                        <div id="routeResults" class="route-search-results"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tiempo *</label>
                    <div class="time-input-group">
                        <div>
                            <input 
                                type="number" 
                                id="minutes" 
                                placeholder="Minutos" 
                                min="0" 
                                max="59" 
                                required
                            >
                        </div>
                        <div>
                            <input 
                                type="number" 
                                id="seconds" 
                                placeholder="Segundos" 
                                min="0" 
                                max="59" 
                                required
                            >
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="date">Fecha *</label>
                    <input 
                        type="date" 
                        id="date" 
                        required
                        max=""
                    >
                </div>

                <div class="form-group">
                    <label for="fileUpload">Foto del Viaje *</label>
                    <div class="file-upload-area" id="fileUploadArea">
                        <input 
                            type="file" 
                            id="fileInput" 
                            accept="image/*" 
                            style="display: none;"
                            required
                        >
                        <div class="upload-icon">📸</div>
                        <div class="upload-text">Arrastra una imagen aquí o haz clic para seleccionar</div>
                        <div class="upload-hint">Formatos: JPG, PNG, GIF. Máximo 10MB</div>
                        <div class="file-info" id="fileInfo" style="display: none;">
                            <div class="file-name" id="fileName"></div>
                            <div class="file-size" id="fileSize"></div>
                            <button type="button" class="remove-file-btn" id="removeFileBtn">Quitar archivo</button>
                        </div>
                    </div>
                </div>

                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-text" id="progressText">0%</div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    Subir Tiempo
                </button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk",
            authDomain: "bicifastness.firebaseapp.com",
            databaseURL: "https://bicifastness-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bicifastness",
            storageBucket: "bicifastness.firebasestorage.app",
            messagingSenderId: "656116731421",
            appId: "1:656116731421:web:a4154d028fe9721c5800f4",
            measurementId: "G-CSFX8EX71S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // Check authentication
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            initializeApp();
        });

        // DOM Elements
        const uploadForm = document.getElementById('uploadForm');
        const routeSearch = document.getElementById('routeSearch');
        const routeResults = document.getElementById('routeResults');
        const fileUploadArea = document.getElementById('fileUploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const removeFileBtn = document.getElementById('removeFileBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const logoutBtn = document.getElementById('logoutBtn');

        let selectedFile = null;
        let availableRoutes = [];
        let currentUser = null;

        function initializeApp() {
            setupEventListeners();
            setMaxDate();
            loadAvailableRoutes();
        }

        function setupEventListeners() {
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    await signOut(auth);
                    window.location.href = 'index.html';
                });
            }

            // Route search
            if (routeSearch) {
                routeSearch.addEventListener('input', handleRouteSearch);
                routeSearch.addEventListener('focus', () => routeResults.classList.add('show'));
            }

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.route-search-container')) {
                    routeResults.classList.remove('show');
                }
            });

            // File upload
            if (fileUploadArea) {
                fileUploadArea.addEventListener('click', () => fileInput.click());
                fileUploadArea.addEventListener('dragover', handleDragOver);
                fileUploadArea.addEventListener('dragleave', handleDragLeave);
                fileUploadArea.addEventListener('drop', handleDrop);
            }

            if (fileInput) {
                fileInput.addEventListener('change', handleFileSelect);
            }

            if (removeFileBtn) {
                removeFileBtn.addEventListener('click', removeFile);
            }

            // Form submission
            if (uploadForm) {
                uploadForm.addEventListener('submit', handleSubmit);
            }
        }

        function setMaxDate() {
            const dateInput = document.getElementById('date');
            if (dateInput) {
                const today = new Date().toISOString().split('T')[0];
                dateInput.max = today;
                dateInput.value = today;
            }
        }

        async function loadAvailableRoutes() {
            try {
                const routesQuery = query(
                    collection(db, 'tiempos_viaje'),
                    where('verificado', '==', true)
                );

                const routesSnapshot = await getDocs(routesQuery);
                const routeSet = new Set();

                routesSnapshot.docs.forEach(doc => {
                    const route = doc.data().ruta;
                    if (route) {
                        routeSet.add(route);
                    }
                });

                availableRoutes = Array.from(routeSet);

            } catch (error) {
                console.error('Error loading routes:', error);
            }
        }

        function handleRouteSearch(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filteredRoutes = availableRoutes.filter(route => 
                route.toLowerCase().includes(searchTerm)
            );
            displayRouteResults(filteredRoutes);
        }

        function displayRouteResults(routes) {
            if (routes.length === 0) {
                routeResults.innerHTML = '<div class="route-option">No hay rutas coincidentes</div>';
                return;
            }

            let html = '';
            routes.forEach(route => {
                html += `
                    <div class="route-option" data-route="${route}">
                        ${route}
                    </div>
                `;
            });

            routeResults.innerHTML = html;

            routeResults.querySelectorAll('.route-option').forEach(option => {
                option.addEventListener('click', () => {
                    routeSearch.value = option.dataset.route;
                    routeResults.classList.remove('show');
                });
            });
        }

        function handleDragOver(e) {
            e.preventDefault();
            fileUploadArea.classList.add('drag-over');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            fileUploadArea.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            fileUploadArea.classList.remove('drag-over');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        }

        function handleFile(file) {
            // Validate file type
            if (!file.type.startsWith('image/')) {
                showError('Por favor, selecciona un archivo de imagen válido');
                return;
            }

            // Validate file size (10MB)
            if (file.size > 10 * 1024 * 1024) {
                showError('El archivo es demasiado grande. Máximo 10MB');
                return;
            }

            selectedFile = file;
            displayFileInfo(file);
        }

        function displayFileInfo(file) {
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'block';
            fileUploadArea.classList.add('has-file');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function removeFile() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.style.display = 'none';
            fileUploadArea.classList.remove('has-file');
        }

        async function handleSubmit(e) {
            e.preventDefault();

            if (!selectedFile) {
                showError('Por favor, selecciona una foto del viaje');
                return;
            }

            const route = routeSearch.value.trim();
            const minutes = parseInt(document.getElementById('minutes').value);
            const seconds = parseInt(document.getElementById('seconds').value);
            const date = document.getElementById('date').value;

            // Validate time
            if (isNaN(minutes) || isNaN(seconds) || minutes < 0 || seconds < 0 || seconds > 59) {
                showError('Por favor, introduce un tiempo válido');
                return;
            }

            // Validate route
            if (!route) {
                showError('Por favor, introduce una ruta válida');
                return;
            }

            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Subiendo...';
            hideMessages();

            try {
                // Get user name
                const userQuery = query(
                    collection(db, 'usuarios'),
                    where('uid', '==', auth.currentUser.uid)
                );
                const userSnapshot = await getDocs(userQuery);
                
                let userName = 'Usuario';
                if (!userSnapshot.empty) {
                    userName = userSnapshot.docs[0].data().nombre;
                }

                // Upload image to Storage
                const storageRef = ref(storage, `capturas/${Date.now()}_${selectedFile.name}`);
                const uploadTask = uploadBytesResumable(storageRef, selectedFile);

                // Show progress
                progressContainer.classList.add('show');

                uploadTask.on('state_changed', 
                    (snapshot) => {
                        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                        progressFill.style.width = progress + '%';
                        progressText.textContent = Math.round(progress) + '%';
                    },
                    (error) => {
                        console.error('Upload error:', error);
                        showError('Error al subir la imagen. Por favor, inténtalo de nuevo.');
                        resetForm();
                    },
                    async () => {
                        // Get download URL
                        const downloadURL = await getDownloadURL(storageRef);

                        // Calculate total seconds
                        const totalSeconds = (minutes * 60) + seconds;
                        const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                        // Save to Firestore
                        await addDoc(collection(db, 'tiempos_viaje'), {
                            usuario: userName,
                            ruta: route,
                            tiempo_segundos: totalSeconds,
                            tiempo_formateado: formattedTime,
                            foto_url: downloadURL,
                            verificado: false,
                            fecha: new Date(date + 'T00:00:00'),
                            uid_usuario: auth.currentUser.uid
                        });

                        console.log('Viaje guardado exitosamente en Firestore');

                        // Success
                        showSuccess();
                        resetForm();
                    }
                );

            } catch (error) {
                console.error('Submit error:', error);
                showError('Error al guardar el tiempo. Por favor, inténtalo de nuevo.');
                resetForm();
            }
        }

        function showSuccess() {
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 5000);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function hideMessages() {
            successMessage.classList.remove('show');
            errorMessage.classList.remove('show');
        }

        function resetForm() {
            uploadForm.reset();
            removeFile();
            progressContainer.classList.remove('show');
            progressFill.style.width = '0%';
            progressText.textContent = '0%';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Subir Tiempo';
            setMaxDate();
        }
    </script>
</body>
</html>
