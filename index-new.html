<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiciFastness - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #000000;
            --accent-blue: #0071c3;
            --accent-cream: #f1efeb;
            --text-primary: #ffffff;
            --text-secondary: #f1efeb;
            --border-color: #333333;
            --card-bg: #1a1a1a;
            --error: #dc3545;
            --success: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
            width: 80px;
            height: 80px;
            background: var(--accent-blue);
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            padding: 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(0, 113, 195, 0.2);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-blue);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .btn:hover {
            background: #005a9e;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        .btn-secondary:hover {
            background: var(--accent-blue);
            color: var(--text-primary);
        }

        .error-message {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        .success-message {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.9rem;
            display: none;
        }

        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            background: var(--card-bg);
            padding: 0 16px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .nav-links {
            text-align: center;
            margin-top: 32px;
        }

        .nav-links a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 500;
            margin: 0 8px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">🚴</div>
            <h1>BiciFastness</h1>
            <p class="subtitle">Ranking de Tiempos BiciMAD</p>
            
            <div id="login-form">
                <div class="error-message" id="login-error"></div>
                <div class="success-message" id="login-success"></div>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Tu contraseña" required>
                    </div>
                    
                    <button type="submit" class="btn" id="loginBtn">Iniciar Sesión</button>
                </form>
                
                <div class="divider">
                    <span>¿No tienes cuenta?</span>
                </div>
                
                <button class="btn btn-secondary" id="showRegisterBtn">Crear Cuenta</button>
            </div>
            
            <div id="register-form" style="display: none;">
                <div class="error-message" id="register-error"></div>
                <div class="success-message" id="register-success"></div>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="reg-name">Nombre de usuario</label>
                        <input type="text" id="reg-name" placeholder="BiciSpeedster" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-email">Correo electrónico</label>
                        <input type="email" id="reg-email" placeholder="tu@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    
                    <button type="submit" class="btn" id="registerBtn">Crear Cuenta</button>
                </form>
                
                <div class="divider">
                    <span>¿Ya tienes cuenta?</span>
                </div>
                
                <button class="btn btn-secondary" id="showLoginBtn">Iniciar Sesión</button>
            </div>
        </div>
        
        <div class="nav-links">
            <a href="ranking.html">Rankings</a>
            <a href="subir.html">Subir Tiempo</a>
            <a href="profile.html">Mi Perfil</a>
            <a href="admin.html">Admin</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk",
            authDomain: "bicifastness.firebaseapp.com",
            databaseURL: "https://bicifastness-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bicifastness",
            storageBucket: "bicifastness.firebasestorage.app",
            messagingSenderId: "656116731421",
            appId: "1:656116731421:web:a4154d028fe9721c5800f4",
            measurementId: "G-CSFX8EX71S"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const showRegisterBtn = document.getElementById('showRegisterBtn');
        const showLoginBtn = document.getElementById('showLoginBtn');
        const loginBtn = document.getElementById('loginBtn');
        const registerBtn = document.getElementById('registerBtn');

        // Check if user is already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'ranking.html';
            }
        });

        // Form switching
        showRegisterBtn.addEventListener('click', () => {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
        });

        showLoginBtn.addEventListener('click', () => {
            document.getElementById('register-form').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        });

        // Login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const successDiv = document.getElementById('login-success');

            loginBtn.disabled = true;
            loginBtn.textContent = 'Iniciando sesión...';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                successDiv.textContent = '¡Sesión iniciada correctamente!';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'ranking.html';
                }, 1000);
            } catch (error) {
                console.error('Login error:', error);
                let errorMessage = 'Error al iniciar sesión';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'Usuario no encontrado';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Contraseña incorrecta';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Email inválido';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Demasiados intentos. Espera unos minutos';
                        break;
                    case 'auth/invalid-credential':
                        errorMessage = 'Credenciales inválidas';
                        break;
                }

                errorDiv.textContent = errorMessage;
                errorDiv.style.display = 'block';
            }

            loginBtn.disabled = false;
            loginBtn.textContent = 'Iniciar Sesión';
        });

        // Register form submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const errorDiv = document.getElementById('register-error');
            const successDiv = document.getElementById('register-success');

            if (password.length < 6) {
                errorDiv.textContent = 'La contraseña debe tener al menos 6 caracteres';
                errorDiv.style.display = 'block';
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = 'Creando cuenta...';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // Save user profile to Firestore
                await addDoc(collection(db, 'usuarios'), {
                    uid: userCredential.user.uid,
                    nombre: name,
                    email: email,
                    fecha_registro: serverTimestamp(),
                    viajes_count: 0
                });

                successDiv.textContent = '¡Cuenta creada correctamente!';
                successDiv.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'ranking.html';
                }, 1000);

            } catch (error) {
                console.error('Register error:', error);
                let errorMessage = 'Error al crear cuenta';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'Este email ya está registrado';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'La contraseña es muy débil';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Email inválido';
                        break;
                }

                errorDiv.textContent = errorMessage;
                errorDiv.style.display = 'block';
            }

            registerBtn.disabled = false;
            registerBtn.textContent = 'Crear Cuenta';
        });
    </script>
</body>
</html>
