<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | BiciFastness</title>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-channeled/css/uicons-solid-channeled.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-straight/css/uicons-bold-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');
        :root { --bg-main: #121212; --bg-card: #1a1a1a; --bg-input: #222; --text-main: #f1efeb; --text-muted: #888; --border: #333; --primary: #0071c3; --nav-bg: rgba(10,10,10,0.9); }
        [data-theme="light"] { --bg-main: #f0f2f5; --bg-card: #ffffff; --bg-input: #f0f0f0; --text-main: #111; --text-muted: #555; --border: #ddd; --primary: #0071c3; --nav-bg: rgba(255,255,255,0.9); }
        
        body { margin: 0; padding: 0; padding-bottom: 100px; background-color: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; transition: all 0.3s;}
        
        nav { background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .brand { color: var(--primary); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; display: flex; align-items: center; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        nav .links { display: flex; align-items: center; }
        nav .links a { color: var(--text-muted); text-decoration: none; margin-left: 20px; font-weight: 600; transition: color 0.3s; line-height: 1; }
        nav .links a.active, nav .links a:hover { color: var(--text-main); }
        .info-icon { color: var(--text-muted); font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; text-decoration: none; line-height: 0; margin-top: -3px; }
        .info-icon:hover { color: var(--primary); }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        .card { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        h2 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .profile-header { text-align: center; margin-bottom: 20px; }
        .pfp { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 10px; cursor: pointer; transition: 0.2s;}
        .pfp:hover { opacity: 0.8; }
        .pfp-input { display: none; }
        .username { font-size: 1.5rem; font-weight: 800; margin: 0;}
        .email { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 20px;}
        
        .stat-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;}
        
        .theme-box { cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-align: left; transition: border-color 0.3s; }
        .theme-box:hover { border-color: var(--primary); }

        .trip-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; transition: 0.2s;}
        .trip-item:hover { border-color: var(--primary); transform: translateY(-2px); }
        .trip-time { font-weight: 800; color: var(--primary); }
        .trip-speed { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        .status-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: #332b00; color: #ffbb33; } .status-verified { background: #003311; color: #00C851; }

        .btn-logout { width: 100%; padding: 12px; background: transparent; border: 1px solid #ff4444; color: #ff4444; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px;}
        .buy-ride-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; margin-top: 15px; background: #FFDD00; color: #111; border-radius: 8px; font-weight: 800; text-decoration: none; cursor: pointer; border:none;}

        /* NAVBAR MÓVIL */
        .bottom-nav { display: none; }
        @media (max-width: 850px) { 
            nav .links { display: none; } 
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border); z-index: 1000; justify-content: space-between; padding: 8px 5px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); box-sizing: border-box;} 
            .bottom-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; text-align: center; } 
            .bottom-nav a.active { color: var(--primary); } 
            .bottom-nav a i { font-size: 1.25rem; line-height: 1; } 
        }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px);}
        .modal-content { display: flex; flex-direction: column; gap: 15px; align-items: center;}
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: white; font-weight: 800;}
        .share-card { background: #121212; padding: 30px; border-radius: 20px; border: 3px solid #0071c3; text-align: center; width: 320px; color: white; }
        .share-brand { color: #0071c3; font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; margin: 0 0 15px 0;}
        .share-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #333; margin-bottom: 10px; object-fit: cover; }
        .share-user { font-size: 1.2rem; font-weight: 800; margin: 0;}
        .share-time { font-size: 2.8rem; font-weight: 900; color: #0071c3; line-height: 1; margin-top: 10px;}
        .share-actions { display: flex; gap: 10px; width: 320px;}
        .btn-share { flex: 1; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-share.transp { background: #222; border: 1px solid #444; }
    </style>
</head>
<body>
    <nav>
        <a href="home.html" class="brand"><img src="images/logo.png" alt="BICIFASTNESS" onerror="this.outerHTML='BICIFASTNESS'"></a>
        <div class="nav-right">
            <div class="links">
                <a href="home.html">Inicio</a>
                <a href="ranking.html">Rankings</a>
                <a href="bicirating.html">BiciRating</a>
                <a href="mapa.html">Mapa</a>
                <a href="clanes.html">Clanes</a>
                <a href="subir.html">Subir</a>
                <a href="profile.html" class="active">Perfil</a>
            </div>
            <a href="info.html" class="info-icon" title="Cómo funciona"><i class="fi fi-bs-info"></i></a>
        </div>
    </nav>

    <div class="bottom-nav">
        <a href="home.html"><i class="fi fi-sr-home"></i>Inicio</a>
        <a href="ranking.html"><i class="fi fi-sr-leaderboard"></i>Rankings</a>
        <a href="bicirating.html"><i class="fi fi-sr-ranking-star"></i>Rating</a>
        <a href="subir.html"><i class="fi fi-sr-add"></i>Subir</a>
        <a href="mapa.html"><i class="fi fi-ss-map-marker"></i>Mapa</a>
        <a href="clanes.html"><i class="fi fi-sr-team-check-alt"></i>Clanes</a>
        <a href="profile.html" class="active"><i class="fi fi-sr-user"></i>Perfil</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="profile-header">
                <label for="pfp-upload"><img src="" id="user-pfp" class="pfp"></label>
                <input type="file" id="pfp-upload" class="pfp-input" accept="image/png, image/jpeg">
                <div class="username" id="user-name">Cargando...</div>
                <div class="email" id="user-email"></div>
            </div>
            <div class="stat-box theme-box" id="theme-toggle-btn">
                <div><div style="font-weight:700; color:var(--text-main);">Aspecto Visual</div><div id="theme-text" style="font-size:0.8rem; color:var(--text-muted);">Modo Oscuro</div></div>
                <div style="font-size:1.5rem;"><i class="fi fi-rr-moon-stars"></i></div>
            </div>
            
            <div class="row" style="display:flex; gap:10px;">
                <div class="stat-box" style="flex:1;"><div class="stat-num" id="total-trips">0</div><div class="stat-label">Viajes</div></div>
                <div class="stat-box" style="flex:1;"><div class="stat-num" id="total-km">0</div><div class="stat-label">KM Totales</div></div>
            </div>

            <button class="buy-ride-btn" id="custom-bmc-btn"><i class="fi fi-sr-bike"></i> Buy me a ride</button>
            <button class="btn-logout" id="logout-btn">Cerrar Sesión</button>
        </div>
        <div class="card">
            <h2>Mis Viajes</h2>
            <div id="trips-container" style="color:var(--text-muted)">Cargando historial...</div>
        </div>
    </div>

    <div class="modal" id="trip-modal">
        <span class="modal-close" onclick="document.getElementById('trip-modal').style.display='none'">&times;</span>
        <div class="modal-content">
            <div class="share-card" id="share-card">
                <h2 class="share-brand">BICIFASTNESS</h2>
                <img src="" id="s-avatar" class="share-avatar">
                <h3 class="share-user" id="s-user">@Piloto</h3>
                <p class="share-date" id="s-date">12 de Marzo 2025</p>
                <div style="background:#1a1a1a; padding:20px; border-radius:16px; border:1px solid #333;">
                    <div id="s-stations" style="font-weight:600; color:#ccc; margin-bottom:15px; line-height:1.4;">A ➔ B</div>
                    <div class="share-time" id="s-time">00m 00s</div>
                    <div id="s-speed" style="color:#888; font-weight:700; font-size:0.9rem; margin-top:5px;"></div>
                    <div class="share-rank" id="s-rank">🏆 Puesto #--</div>
                </div>
                <div style="margin-top:25px; font-size:0.85rem; color:#555; font-weight:700;">bicifastness.es</div>
            </div>
            <div class="share-actions">
                <button class="btn-share" onclick="exportImage(false)" id="share-btn-solid">Compartir</button>
                <button class="btn-share transp" onclick="exportImage(true)" id="share-btn-transp">Sin Fondo</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk", authDomain: "bicifastness.firebaseapp.com", projectId: "bicifastness", messagingSenderId: "656116731421", appId: "1:656116731421:web:a4154d028fe9721c5800f4" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        // ! IMPORTANTE: PEGA AQUÍ TU rawStations COMPLETO CON LAS 600 ESTACIONES
        const rawStations = `2 - Metro Callao\n3 - Plaza Conde Suchil\n4 - Malasaña\n5 - Fuencarral`; 

        const estacionesMap = {};
        rawStations.split('\n').forEach(line => {
            if(!line.trim()) return;
            let parts = line.split(' - '); let rawNum = parts[0].trim(); let name = parts.slice(1).join(' - ').trim();
            let match = rawNum.match(/^(\d+)([A-Z]?)$/i);
            if(match) { let n = match[1]; let l = match[2].toUpperCase() || ''; if(n.length < 3) n = n.padStart(3, '0'); estacionesMap[n + l] = name; } 
            else { estacionesMap[rawNum] = name; }
        });

        document.getElementById('theme-toggle-btn').addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });

        let usernameGlobal = "Piloto"; let avatarGlobal = "";

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = "index.html";
            else {
                document.getElementById('user-email').innerText = user.email;
                const userDoc = await getDoc(doc(db, "usuarios", user.email));
                if(userDoc.exists()){
                    usernameGlobal = userDoc.data().username;
                    avatarGlobal = userDoc.data().avatar;
                    document.getElementById('user-name').innerText = usernameGlobal;
                    document.getElementById('user-pfp').src = avatarGlobal || 'https://api.dicebear.com/7.x/initials/svg?seed=' + user.email;
                }
                loadTrips(user.email);
            }
        });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        async function loadTrips(email) {
            const c = document.getElementById('trips-container');
            const q = query(collection(db, "tiempos_viaje"), where("email_real", "==", email));
            try {
                const snap = await getDocs(q);
                window.userTrips = []; 
                let totalKm = 0; // Sumador de kilómetros

                snap.forEach(d => {
                    const data = d.data();
                    window.userTrips.push({ id: d.id, ...data });
                    if(data.verificado && data.distancia_km) totalKm += data.distancia_km; // Solo sumamos KM validados
                });

                window.userTrips.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
                
                document.getElementById('total-trips').innerText = window.userTrips.length;
                document.getElementById('total-km').innerText = totalKm.toFixed(1);

                c.innerHTML = window.userTrips.length ? '' : 'No has subido viajes.';
                
                window.userTrips.forEach((t, index) => {
                    const sCls = t.verificado ? 'status-verified' : 'status-pending';
                    const sTxt = t.verificado ? 'Verificado' : 'Pendiente';
                    const d = new Date(t.fecha); const month = d.toLocaleString('es-ES', { month: 'long' });
                    
                    const [o, dest] = t.ruta.split('-');
                    const nameO = estacionesMap[o] || o;
                    const nameD = estacionesMap[dest] || dest;
                    
                    const speed = t.velocidad_kmh ? `<div class="trip-speed">${t.velocidad_kmh} km/h</div>` : '';

                    c.innerHTML += `
                        <div class="trip-item" onclick="openModal(${index})">
                            <div><div style="font-weight:700">${nameO} ➔ ${nameD}</div><div style="font-size:0.75rem">${d.getDate()} ${month} ${d.getFullYear()}</div></div>
                            <div style="text-align:right"><div class="trip-time">${t.tiempo_formateado}</div>${speed}<div class="status-badge ${sCls}" style="margin-top:4px; display:inline-block;">${sTxt}</div></div>
                        </div>`;
                });
            } catch (err) { c.innerHTML = "Error al cargar datos."; }
        }

        window.openModal = async function(index) {
            const trip = window.userTrips[index];
            document.getElementById('trip-modal').style.display = 'flex';
            
            document.getElementById('s-user').innerText = "@" + usernameGlobal;
            document.getElementById('s-avatar').src = avatarGlobal || `https://api.dicebear.com/7.x/initials/svg?seed=${trip.email_real}`;
            
            const d = new Date(trip.fecha); const month = d.toLocaleString('es-ES', { month: 'long' });
            document.getElementById('s-date').innerText = `${d.getDate()} de ${month} ${d.getFullYear()}`;
            
            const [o, dest] = trip.ruta.split('-');
            document.getElementById('s-stations').innerHTML = `${estacionesMap[o]||o} <br>⬇<br> ${estacionesMap[dest]||dest}`;
            document.getElementById('s-time').innerText = trip.tiempo_formateado;
            document.getElementById('s-speed').innerText = trip.velocidad_kmh ? `⚡ Media de ${trip.velocidad_kmh} km/h` : '';

            const rankEl = document.getElementById('s-rank');
            if(!trip.verificado) {
                rankEl.innerText = "⏳ En revisión"; rankEl.style.color = "#ffbb33"; rankEl.style.background = "rgba(255,187,51,0.1)";
                document.getElementById('share-btn-transp').style.display = 'none';
            } else {
                rankEl.innerText = "Calculando ranking..."; rankEl.style.color = "#FFD700"; rankEl.style.background = "rgba(255, 215, 0, 0.1)";
                document.getElementById('share-btn-transp').style.display = 'block';
                const q = query(collection(db, "tiempos_viaje"), where("ruta", "==", trip.ruta), where("verificado", "==", true));
                const snap = await getDocs(q); let arr = []; snap.forEach(d => arr.push({id: d.id, t: d.data().tiempo_segundos}));
                arr.sort((a,b) => a.t - b.t);
                rankEl.innerText = `🏆 Puesto #${arr.findIndex(x => x.id === trip.id) + 1} de ${arr.length}`;
            }
        }
        window.exportImage = async function(transparent) { /* Lógica de Html2Canvas (Igual que antes) */ }
    </script>
</body>
</html>
