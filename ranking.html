<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings | BiciFastness</title>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-channeled/css/uicons-solid-channeled.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-straight/css/uicons-bold-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        :root { --bg-main: #121212; --bg-card: #1a1a1a; --bg-input: #222; --text-main: #f1efeb; --text-muted: #888; --border: #333; --primary: #0071c3; --nav-bg: rgba(10,10,10,0.9); }
        [data-theme="light"] { --bg-main: #f0f2f5; --bg-card: #ffffff; --bg-input: #f0f0f0; --text-main: #111; --text-muted: #555; --border: #ddd; --primary: #0071c3; --nav-bg: rgba(255,255,255,0.9); }
        
        body { margin: 0; padding: 0; padding-bottom: 70px; background-color: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; transition: all 0.3s;}
        
        /* NAVBAR UNIFICADO (PC) */
        nav { background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .brand { color: var(--primary); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; display: flex; align-items: center; }
        .nav-right { display: flex; align-items: center; gap: 20px; line-height: 1; }
        nav .links { display: flex; align-items: center; }
        nav .links a { color: var(--text-muted); text-decoration: none; font-weight: 600; margin-left: 20px; transition: color 0.3s; }
        nav .links a.active, nav .links a:hover { color: var(--text-main); }
        .info-icon { color: var(--text-muted); font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; text-decoration: none; line-height: 0; margin-top: -3px; }
        .info-icon:hover { color: var(--primary); }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        
        .search-section { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        .search-input { width: 100%; padding: 15px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; font-size: 1rem; font-family: inherit; outline: none; box-sizing: border-box; }
        
        .routes-wrapper { position: relative; display: flex; align-items: center; margin-top: 15px; }
        .scroll-btn { display: none; position: absolute; z-index: 10; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); border-radius: 50%; width: 40px; height: 40px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); align-items: center; justify-content: center; top: 50%; transform: translateY(-50%); transition: 0.2s; opacity: 0.6; backdrop-filter: blur(2px); }
        .scroll-btn:hover { color: var(--primary); opacity: 1; }
        .scroll-btn.left { left: -15px; } .scroll-btn.right { right: -15px; }
        
        .routes-container { display: flex; flex-direction: row; gap: 10px; overflow-x: auto; padding: 5px 0; white-space: nowrap; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; scrollbar-width: none; width: 100%;}
        .routes-container::-webkit-scrollbar { display: none; }
        
        .route-btn { flex: 0 0 auto; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 12px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; font-family: inherit; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .route-btn.active { background: var(--primary) !important; color: white !important; border-color: var(--primary) !important; }
        .glowing-btn { border-color: #FFD700 !important; color: #FFD700 !important; font-weight: 800; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); } 70% { box-shadow: 0 0 0 8px rgba(255, 215, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); } }

        .ranking-section { background: var(--bg-card); padding: 25px; border-radius: 12px; border: 1px solid var(--border); display: none; }
        .ranking-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 15px; }
        .ranking-header h2 { margin: 0; font-size: 1.1rem; color: var(--primary); }
        .pin-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; line-height: 1; }
        .pin-btn.pinned { color: var(--primary); }

        .rank-row { display: grid; grid-template-columns: 35px 40px minmax(0, 1fr) max-content; gap: 10px; align-items: center; background: var(--bg-input); padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); width: 100%; box-sizing: border-box; }
        .rank-pos { font-size: 1.2rem; font-weight: 800; color: var(--text-muted); text-align: center; }
        .rank-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
        .rank-user-container { overflow: hidden; }
        .rank-user { font-weight: 700; font-size: 1rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .rank-date { font-size: 0.75rem; color: var(--text-muted); display: block; font-weight: 400; }
        .rank-stats { text-align: right; min-width: 65px; }
        .rank-time { font-weight: 800; color: var(--primary); font-size: 1.1rem; }
        .rank-delta { font-size: 0.8rem; font-weight: 700; color: #ff4444; } 
        .delta-leader { color: #00C851; font-size: 0.8rem; font-weight: 700; } 

        .rank-1 { border-color: #FFD700; background: rgba(255, 215, 0, 0.05); } .rank-1 .rank-pos { color: #FFD700; }
        .rank-2 { border-color: #C0C0C0; background: rgba(192, 192, 192, 0.05); } .rank-2 .rank-pos { color: #C0C0C0; }
        .rank-3 { border-color: #CD7F32; background: rgba(205, 127, 50, 0.05); } .rank-3 .rank-pos { color: #CD7F32; }

        /* MEJORA MÓVIL DEL RANKING */
        @media (max-width: 600px) {
            .rank-row { grid-template-columns: 25px 35px minmax(0, 1fr) max-content; gap: 8px; padding: 10px; }
            .rank-pos { font-size: 1rem; }
            .rank-avatar { width: 35px; height: 35px; }
            .rank-user { font-size: 0.9rem; }
            .rank-time { font-size: 1rem; }
        }

        /* NAVBAR INFERIOR (MÓVIL) */
        .bottom-nav { display: none; }
        @media (max-width: 850px) { 
            nav .links { display: none; } 
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border); z-index: 1000; justify-content: space-between; padding: 8px 5px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); box-sizing: border-box;} 
            .bottom-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; text-align: center; } 
            .bottom-nav a.active { color: var(--primary); } 
            .bottom-nav a i { font-size: 1.25rem; line-height: 1; } 
        }
    </style>
</head>
<body>
    <nav>
        <a href="home.html" class="brand">BICIFASTNESS</a>
        <div class="nav-right">
            <div class="links">
                <a href="home.html">Inicio</a>
                <a href="ranking.html" class="active">Rankings</a>
                <a href="bicirating.html">BiciRating</a>
                <a href="mapa.html">Mapa</a>
                <a href="clanes.html">Clanes</a>
                <a href="subir.html">Subir</a>
                <a href="profile.html">Perfil</a>
            </div>
            <a href="info.html" class="info-icon" title="Cómo funciona"><i class="fi fi-bs-info"></i></a>
        </div>
    </nav>

    <div class="bottom-nav">
        <a href="home.html"><i class="fi fi-sr-home"></i>Inicio</a>
        <a href="ranking.html" class="active"><i class="fi fi-sr-leaderboard"></i>Rankings</a>
        <a href="bicirating.html"><i class="fi fi-sr-ranking-star"></i>Rating</a>
        <a href="subir.html"><i class="fi fi-sr-add"></i>Subir</a>
        <a href="mapa.html"><i class="fi fi-ss-map-marker"></i>Mapa</a>
        <a href="clanes.html"><i class="fi fi-sr-team-check-alt"></i>Clanes</a>
        <a href="profile.html"><i class="fi fi-sr-user"></i>Perfil</a>
    </div>

    <div class="container">
        <div class="search-section" id="search-section">
            <h2 style="margin:0 0 10px 0; color:var(--text-main);">Buscar Trayecto</h2>
            <input type="text" id="search-input" class="search-input" placeholder="Buscar nombre de estación o número...">
            <div class="routes-wrapper">
                <button class="scroll-btn left" id="scroll-left"><i class="fi fi-rr-angle-left"></i></button>
                <div class="routes-container" id="routes-container">Cargando datos...</div>
                <button class="scroll-btn right" id="scroll-right"><i class="fi fi-rr-angle-right"></i></button>
            </div>
        </div>
        <div class="ranking-section" id="ranking-section">
            <div class="ranking-header">
                <h2 id="ranking-title">Ruta --</h2>
                <button id="pin-btn" class="pin-btn" title="Anclar como favorita"><i class="fi fi-sr-bookmark"></i></button>
            </div>
            <div id="ranking-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk", authDomain: "bicifastness.firebaseapp.com", projectId: "bicifastness", messagingSenderId: "656116731421", appId: "1:656116731421:web:a4154d028fe9721c5800f4" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

        // INSERTA AQUÍ TU rawStations COMPLETO
        const rawStations = `2 - Metro Callao\n3 - Plaza Conde Suchil\n4 - Malasaña\n5 - Fuencarral`; 

        const estacionesMap = {};
        rawStations.split('\n').forEach(line => {
            if(!line.trim()) return;
            let parts = line.split(' - '); let rawNum = parts[0].trim(); let name = parts.slice(1).join(' - ').trim();
            let match = rawNum.match(/^(\d+)([A-Z]?)$/i);
            if(match) { let n = match[1]; let l = match[2].toUpperCase() || ''; if(n.length < 3) n = n.padStart(3, '0'); estacionesMap[n + l] = name; } 
            else { estacionesMap[rawNum] = name; }
        });

        function getRouteName(rutaId) {
            const [o, d] = rutaId.split('-');
            const nameO = estacionesMap[o] || o;
            const nameD = estacionesMap[d] || d;
            return `<div style="display:flex; align-items:center; gap:5px;"><span>${nameO}</span> <i class="fi fi-rr-arrow-right" style="font-size:0.8em; margin-top:2px;"></i> <span>${nameD}</span></div>`;
        }

        let allTrips = [], uniqueRoutes = [], usersMap = {};
        let highlightedRoute = null; let currentU = null; let userFavorites = []; let selectedRouteId = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = "index.html";
            else {
                currentU = user;
                const userDoc = await getDoc(doc(db, "usuarios", user.email));
                if(userDoc.exists()) userFavorites = userDoc.data().favoriteRoutes || [];
                load();
            }
        });

        async function load() {
            const uSnap = await getDocs(collection(db, "usuarios"));
            uSnap.forEach(d => usersMap[d.id] = d.data());

            try {
                const confDoc = await getDoc(doc(db, "config", "general"));
                if(confDoc.exists()) highlightedRoute = confDoc.data().ruta_destacada;
            } catch(e) {}

            const q = query(collection(db, "tiempos_viaje"), where("verificado", "==", true));
            const snap = await getDocs(q);
            const rSet = new Set();
            snap.forEach(d => { allTrips.push(d.data()); rSet.add(d.data().ruta); });
            uniqueRoutes = Array.from(rSet).sort();
            
            if (highlightedRoute && !uniqueRoutes.includes(highlightedRoute)) uniqueRoutes.push(highlightedRoute);
            renderDefaultBtns();
        }
        
        function updateArrows() {
            const c = document.getElementById('routes-container');
            const lBtn = document.getElementById('scroll-left');
            const rBtn = document.getElementById('scroll-right');
            if(window.innerWidth <= 768 || c.scrollWidth <= c.clientWidth) { lBtn.style.display = 'none'; rBtn.style.display = 'none'; } 
            else { lBtn.style.display = 'flex'; rBtn.style.display = 'flex'; }
        }

        document.getElementById('scroll-left').onclick = () => document.getElementById('routes-container').scrollBy({ left: -250, behavior: 'smooth' });
        document.getElementById('scroll-right').onclick = () => document.getElementById('routes-container').scrollBy({ left: 250, behavior: 'smooth' });
        window.addEventListener('resize', updateArrows);

        function renderDefaultBtns() {
            const c = document.getElementById('routes-container'); c.innerHTML = '';
            if (highlightedRoute) {
                const b = document.createElement('button'); b.className = 'route-btn glowing-btn';
                b.innerHTML = `🔥 ${getRouteName(highlightedRoute)}`;
                b.onclick = () => select(highlightedRoute, b); c.appendChild(b);
            }
            userFavorites.forEach(r => {
                if (r !== highlightedRoute) {
                    const b = document.createElement('button'); b.className = 'route-btn';
                    b.innerHTML = `<i class="fi fi-sr-bookmark" style="font-size:0.9em; color:var(--primary);"></i> ${getRouteName(r)}`; 
                    b.style.borderColor = 'var(--primary)';
                    b.onclick = () => select(r, b); c.appendChild(b);
                }
            });
            if(!highlightedRoute && userFavorites.length === 0) { c.innerHTML = "<span style='color:var(--text-muted); font-size:0.9rem; padding: 10px 0;'>Busca una ruta arriba y ánclala.</span>"; }
            setTimeout(updateArrows, 100);
        }

        document.getElementById('search-input').addEventListener('input', e => {
            const term = e.target.value.trim().toLowerCase();
            if (!term) { renderDefaultBtns(); return; }
            const filtered = uniqueRoutes.filter(r => r.toLowerCase().includes(term) || (estacionesMap[r.split('-')[0]]||"").toLowerCase().includes(term) || (estacionesMap[r.split('-')[1]]||"").toLowerCase().includes(term));
            const c = document.getElementById('routes-container'); c.innerHTML = '';
            filtered.forEach(r => {
                const b = document.createElement('button'); b.className = 'route-btn'; 
                b.innerHTML = getRouteName(r); b.onclick = () => select(r, b); c.appendChild(b);
            });
            setTimeout(updateArrows, 100);
        });

        document.getElementById('pin-btn').addEventListener('click', async () => {
            if(!selectedRouteId) return;
            const btn = document.getElementById('pin-btn');
            if(userFavorites.includes(selectedRouteId)) {
                userFavorites = userFavorites.filter(r => r !== selectedRouteId);
                btn.classList.remove('pinned'); btn.innerHTML = '<i class="fi fi-br-bookmark"></i>';
            } else {
                if(userFavorites.length >= 3) { alert("Límite de 3 rutas favoritas alcanzado."); return; }
                userFavorites.push(selectedRouteId);
                btn.classList.add('pinned'); btn.innerHTML = '<i class="fi fi-sr-bookmark"></i>';
            }
            await setDoc(doc(db, "usuarios", currentU.email), { favoriteRoutes: userFavorites }, { merge: true });
            if(!document.getElementById('search-input').value.trim()) renderDefaultBtns();
        });

        function select(ruta, btn) {
            selectedRouteId = ruta;
            document.querySelectorAll('.route-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active');
            document.getElementById('ranking-section').style.display = 'block'; 
            document.getElementById('ranking-title').innerHTML = getRouteName(ruta);
            
            const pinBtn = document.getElementById('pin-btn');
            if(userFavorites.includes(ruta)) { pinBtn.classList.add('pinned'); pinBtn.innerHTML = '<i class="fi fi-sr-bookmark"></i>'; }
            else { pinBtn.classList.remove('pinned'); pinBtn.innerHTML = '<i class="fi fi-br-bookmark"></i>'; }
            
            let rawTrips = allTrips.filter(t => t.ruta === ruta).sort((a,b) => a.tiempo_segundos - b.tiempo_segundos);
            let trips = []; let seenUsers = new Set();
            for (let t of rawTrips) { if (!seenUsers.has(t.email_real)) { seenUsers.add(t.email_real); trips.push(t); } }

            const list = document.getElementById('ranking-list'); list.innerHTML = '';
            if(trips.length === 0) { list.innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-muted); font-weight:600;">Aún no hay tiempos para esta ruta. ¡Sé el primero!</div>`; return; }

            const best = trips[0].tiempo_segundos;
            trips.forEach((t, i) => {
                const pos = i + 1;
                const rClass = pos === 1 ? 'rank-1' : pos === 2 ? 'rank-2' : pos === 3 ? 'rank-3' : '';
                
                let deltaHtml = "";
                if(pos === 1) deltaHtml = `<div class="delta-leader">Líder 👑</div>`;
                else {
                    let diff = t.tiempo_segundos - best; let dm = Math.floor(diff / 60); let ds = diff % 60;
                    let text = dm > 0 ? `+${dm}m ${ds}s` : `+${ds}s`; deltaHtml = `<div class="rank-delta">${text}</div>`;
                }
                
                const userData = usersMap[t.email_real] || {};
                const avatar = userData.avatar || `https://api.dicebear.com/7.x/initials/svg?seed=${t.email_real}&backgroundColor=0071c3`;
                const username = userData.username || "Piloto";
                const d = new Date(t.fecha); const month = d.toLocaleString('es-ES', { month: 'long' });
                const dateString = `${d.getDate()} de ${month.charAt(0).toUpperCase() + month.slice(1)} ${d.getFullYear()}`;
                
                list.innerHTML += `
                    <div class="rank-row ${rClass}">
                        <div class="rank-pos">#${pos}</div>
                        <img src="${avatar}" class="rank-avatar">
                        <div class="rank-user-container">
                            <div class="rank-user">${username}</div>
                            <span class="rank-date">${dateString}</span>
                        </div>
                        <div class="rank-stats">
                            <div class="rank-time">${t.tiempo_formateado}</div>
                            ${deltaHtml}
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
