<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mapa | BiciFastness</title>
    
    <script>
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-channeled/css/uicons-solid-channeled.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-straight/css/uicons-bold-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        :root { --bg-main: #121212; --bg-card: #1a1a1a; --bg-input: #222; --text-main: #f1efeb; --text-muted: #888; --border: #333; --primary: #0071c3; --nav-bg: rgba(10,10,10,0.9); }
        [data-theme="light"] { --bg-main: #f0f2f5; --bg-card: #ffffff; --bg-input: #f0f0f0; --text-main: #111; --text-muted: #555; --border: #ddd; --primary: #0071c3; --nav-bg: rgba(255,255,255,0.9); }
        
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: var(--bg-main);}
        
        nav { background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        nav .brand { color: var(--primary); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; display: flex; align-items: center; }
        .nav-right { display: flex; align-items: center; gap: 20px; line-height: 1; }
        nav .links { display: flex; align-items: center; }
        nav .links a { color: var(--text-muted); text-decoration: none; font-weight: 600; margin-left: 15px; transition: color 0.3s; }
        nav .links a.active, nav .links a:hover { color: var(--text-main); }
        .info-icon { color: var(--text-muted); font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; text-decoration: none; line-height: 0; margin-top: -3px; }
        .info-icon:hover { color: var(--primary); }
        
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        
        .locate-btn { position: absolute; bottom: 90px; right: 20px; z-index: 1000; background: var(--primary); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s;}
        .locate-btn:hover { transform: scale(1.1); }

        /* ESTILO DEL POPUP */
        .leaflet-popup-content-wrapper { background: var(--bg-card); color: var(--text-main); border-radius: 12px; font-family: 'Poppins', sans-serif; padding: 0; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.5);}
        .leaflet-popup-tip { display: none; }
        .popup-header { background: var(--bg-input); padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
        .popup-title { font-weight: 800; font-size: 1.1rem; margin: 0; color: var(--text-main); }
        .popup-clan { font-size: 0.8rem; font-weight: 700; display: inline-block; padding: 4px 10px; border-radius: 20px; margin-top: 5px; color: white; }
        .popup-body { padding: 15px; }
        
        /* BOTÓN ASALTAR AZUL */
        .btn-asaltar { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--primary); color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: 800; text-transform: uppercase; margin-top: 10px; transition: 0.2s; box-sizing: border-box; border: none;}
        .btn-asaltar:hover { background: #005a9e; transform: scale(0.98); }

        .bottom-nav { display: none; }
        @media (max-width: 850px) { 
            nav .links { display: none; } 
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border); z-index: 1000; justify-content: space-between; padding: 8px 5px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); box-sizing: border-box;} 
            .bottom-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; text-align: center; } 
            .bottom-nav a.active { color: var(--primary); } 
            .bottom-nav a i { font-size: 1.25rem; line-height: 1; } 
        }
    </style>
    <link rel="icon" href="./logo.png?v=3" type="image/png">
</head>
<body>
    <nav>
        <a href="home.html" class="brand">BICIFASTNESS</a>
        <div class="nav-right">
            <div class="links">
                <a href="home.html">Inicio</a>
                <a href="ranking.html">Rankings</a>
                <a href="bicirating.html">BiciRating</a>
                <a href="mapa.html" class="active">Mapa</a>
                <a href="clanes.html">Clanes</a>
                <a href="subir.html">Subir</a>
                <a href="profile.html">Perfil</a>
            </div>
            <a href="info.html" class="info-icon" title="Cómo funciona"><i class="fi fi-bs-info"></i></a>
        </div>
    </nav>

    <button class="locate-btn" id="locate-btn" title="Mi ubicación"><i class="fi fi-br-crosshairs"></i></button>

    <div id="map"></div>

    <div class="bottom-nav">
        <a href="home.html"><i class="fi fi-sr-home"></i>Inicio</a>
        <a href="ranking.html"><i class="fi fi-sr-ranking-star"></i>Rankings</a>
        <a href="bicirating.html"><i class="fi fi-sr-leaderboard-trophy"></i>Rating</a>
        <a href="subir.html"><i class="fi fi-sr-add"></i>Subir</a>
        <a href="mapa.html" class="active"><i class="fi fi-ss-map-marker"></i>Mapa</a>
        <a href="clanes.html"><i class="fi fi-sr-team-check-alt"></i>Clanes</a>
        <a href="profile.html"><i class="fi fi-sr-user"></i>Perfil</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk", authDomain: "bicifastness.firebaseapp.com", projectId: "bicifastness", messagingSenderId: "656116731421", appId: "1:656116731421:web:a4154d028fe9721c5800f4" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CONFIGURACIÓN MAPA
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        const tileUrl = isDark ? 
            'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 
            'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

        const map = L.map('map', { zoomControl: false }).setView([40.4168, -3.7038], 14);
        L.tileLayer(tileUrl, { attribution: '&copy; BiciFastness' }).addTo(map);

        document.getElementById('locate-btn').addEventListener('click', () => { 
            map.locate({setView: true, maxZoom: 16}); 
        });

        // CARGA Y RENDERIZADO PRINCIPAL
        async function loadMapData() {
            try {
                // 1. Obtener información de todos los clanes (Para saber sus colores y nombres)
                const clanesSnap = await getDocs(collection(db, "clanes"));
                const clanesDict = {};
                clanesSnap.forEach(doc => { clanesDict[doc.id] = doc.data(); });

                // 2. Obtener las estadísticas de dominio de las estaciones
                const statsSnap = await getDocs(collection(db, "estaciones_stats"));
                const statsDict = {};
                statsSnap.forEach(doc => { statsDict[doc.id] = doc.data(); });

                // 3. Cargar el GeoJSON de la EMT
                const response = await fetch('data/emt.geojson');
                if (!response.ok) throw new Error("Error al cargar emt.geojson");
                const geojsonData = await response.json();

                // 4. Dibujar en el mapa cruzando los datos
                L.geoJSON(geojsonData, {
                    pointToLayer: function (feature, latlng) {
                        const stationNum = feature.properties.number;
                        const statInfo = statsDict[stationNum];
                        
                        // Si hay datos en Firebase, miramos quién domina. Si no, es neutral.
                        const clanId = statInfo ? statInfo.clan_dominante : null;
                        const clanColor = (clanId && clanesDict[clanId]) ? clanesDict[clanId].color : "#888888";

                        return L.circleMarker(latlng, {
                            radius: 8,
                            fillColor: clanColor,
                            color: "#ffffff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.9
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        const stationNum = feature.properties.number;
                        const statInfo = statsDict[stationNum];
                        
                        const clanId = statInfo ? statInfo.clan_dominante : null;
                        const clanData = (clanId && clanesDict[clanId]) ? clanesDict[clanId] : null;
                        const puntosTotales = statInfo ? (statInfo.total_puntos || 0) : 0;

                        // Construcción de la etiqueta del clan
                        let clanBadge = clanData 
                            ? `<span class="popup-clan" style="background:${clanData.color};">Dominada por: ${clanData.nombre}</span>` 
                            : `<span class="popup-clan" style="background:#888;">Territorio Neutral</span>`;

                        const popupContent = `
                            <div class="popup-header">
                                <h3 class="popup-title">${feature.properties.Name}</h3>
                                <p style="margin:5px 0 0 0; font-size:0.85rem; color: var(--text-muted);">${feature.properties.Address}</p>
                                ${clanBadge}
                            </div>
                            <div class="popup-body">
                                <a href="subir.html?origen=${stationNum}" class="btn-asaltar">
                                    <i class="fi fi-sr-sword"></i> ¡Atacar Estación!
                                </a>
                            </div>
                        `;
                        layer.bindPopup(popupContent, { minWidth: 240 });
                    }
                }).addTo(map);

            } catch (error) {
                console.error('Error inicializando el mapa:', error);
            }
        }

        // Iniciar la carga
        loadMapData();
    </script>
</body>
</html>
