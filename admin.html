<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - BiciFastness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0071c3;
            --primary-dark: #005a9e;
            --primary-light: #4a90e2;
            --white: #ffffff;
            --black: #000000;
            --cream: #f1efeb;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-400: #6c757d;
            --red: #dc3545;
            --red-dark: #c82333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--white) 0%, var(--cream) 100%);
            min-height: 100vh;
            color: var(--black);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--primary-blue);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 113, 195, 0.3);
        }

        .logo-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--white);
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary-blue) 50%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-size: 1rem;
            color: var(--gray-400);
            margin-top: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        nav a {
            color: var(--black);
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            background: var(--gray-200);
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        nav a:hover, nav a.active {
            background: var(--primary-blue);
            color: var(--white);
            box-shadow: 0 4px 20px rgba(0, 113, 195, 0.3);
        }

        nav a.active {
            border-color: var(--primary-light);
        }

        /* Login Form */
        .login-container {
            background: var(--white);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            margin: 0 auto;
            border: 1px solid var(--gray-200);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .login-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            color: var(--black);
        }

        .login-subtitle {
            color: var(--gray-400);
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--black);
        }

        .form-group input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid var(--gray-200);
            background: var(--white);
            color: var(--black);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--primary-blue);
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 113, 195, 0.2);
        }

        .form-group input::placeholder {
            color: var(--gray-400);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            color: var(--white);
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 113, 195, 0.3);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid var(--red);
            color: var(--red);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .login-error.show {
            display: block;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
        }

        .admin-panel.show {
            display: block;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .admin-header h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            color: var(--black);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-email {
            color: var(--gray-400);
            font-size: 0.9rem;
        }

        .logout-btn {
            padding: 10px 20px;
            background: var(--gray-200);
            border: 2px solid var(--red);
            color: var(--red);
            border-radius: 50px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--red);
            color: var(--white);
        }

        /* Pending Items */
        .pending-container {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .pending-header {
            padding: 20px 24px;
            background: var(--gray-100);
            border-bottom: 2px solid var(--primary-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pending-header h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            color: var(--black);
        }

        .pending-count {
            background: var(--primary-blue);
            color: var(--white);
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .pending-list {
            padding: 16px;
        }

        .pending-item {
            background: var(--gray-100);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--gray-200);
        }

        .pending-item:last-child {
            margin-bottom: 0;
        }

        .pending-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .pending-item-info h4 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 4px;
            color: var(--black);
        }

        .pending-item-info .route {
            color: var(--gray-400);
            font-size: 0.9rem;
        }

        .pending-item-time {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
        }

        .pending-item-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 12px;
            background: var(--white);
            margin-bottom: 16px;
        }

        .pending-item-date {
            color: var(--gray-400);
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .pending-item-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .action-btn.approve {
            background: var(--primary-blue);
            color: var(--white);
        }

        .action-btn.approve:hover {
            background: var(--primary-dark);
            box-shadow: 0 4px 20px rgba(0, 113, 195, 0.3);
        }

        .action-btn.reject {
            background: transparent;
            border-color: var(--red);
            color: var(--red);
        }

        .action-btn.reject:hover {
            background: var(--red);
            color: var(--white);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray-400);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
            fill: currentColor;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }

            .login-container {
                padding: 24px;
            }

            .admin-header {
                flex-direction: column;
                text-align: center;
            }

            .user-info {
                flex-direction: column;
            }

            .pending-item-header {
                flex-direction: column;
            }

            .pending-item-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                </div>
                <h1>BiciFastness</h1>
            </div>
            <p class="tagline">Panel de Administración</p>
        </header>

        <nav>
            <a href="index.html">Ranking</a>
            <a href="subir.html">Subir Tiempo</a>
            <a href="admin.html" class="active">Admin</a>
        </nav>

        <!-- Login Form -->
        <div class="login-container" id="login-container">
            <h2 class="login-title">Acceso Administrador</h2>
            <p class="login-subtitle">Introduce tus credenciales para acceder al panel de verificación</p>

            <div class="login-error" id="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="admin@bicifastness.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn" id="login-btn">Iniciar sesión</button>
            </form>
        </div>

        <!-- Admin Panel -->
        <div class="admin-panel" id="admin-panel">
            <div class="admin-header">
                <h2>Tiempos Pendientes de Verificación</h2>
                <div class="user-info">
                    <span class="user-email" id="user-email"></span>
                    <button class="logout-btn" id="logout-btn">Cerrar sesión</button>
                </div>
            </div>

            <div class="pending-container">
                <div class="pending-header">
                    <h3>Pendientes</h3>
                    <span class="pending-count" id="pending-count">0</span>
                </div>
                <div class="pending-list" id="pending-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Cargando tiempos pendientes...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, deleteObject } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk",
            authDomain: "bicifastness.firebaseapp.com",
            databaseURL: "https://bicifastness-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bicifastness",
            storageBucket: "bicifastness.firebasestorage.app",
            messagingSenderId: "656116731421",
            appId: "1:656116731421:web:a4154d028fe9721c5800f4",
            measurementId: "G-CSFX8EX71S"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app);

        // DOM Elements
        const loginContainer = document.getElementById('login-container');
        const adminPanel = document.getElementById('admin-panel');
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const userEmail = document.getElementById('user-email');
        const pendingList = document.getElementById('pending-list');
        const pendingCount = document.getElementById('pending-count');

        let unsubscribePending = null;

        // Auth state observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                showAdminPanel(user);
            } else {
                showLoginForm();
            }
        });

        // Login form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Iniciando sesión...';
            loginError.classList.remove('show');

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                console.error('Login error:', error);
                let errorMessage = 'Error al iniciar sesión.';
                
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = 'Usuario no encontrado.';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Contraseña incorrecta.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Email inválido.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Demasiados intentos. Espera unos minutos.';
                        break;
                    case 'auth/invalid-credential':
                        errorMessage = 'Credenciales inválidas.';
                        break;
                }

                loginError.textContent = errorMessage;
                loginError.classList.add('show');
            }

            loginBtn.disabled = false;
            loginBtn.textContent = 'Iniciar sesión';
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                await signOut(auth);
            } catch (error) {
                console.error('Logout error:', error);
            }
        });

        function showLoginForm() {
            loginContainer.style.display = 'block';
            adminPanel.classList.remove('show');
            
            if (unsubscribePending) {
                unsubscribePending();
                unsubscribePending = null;
            }
        }

        function showAdminPanel(user) {
            loginContainer.style.display = 'none';
            adminPanel.classList.add('show');
            userEmail.textContent = user.email;
            
            loadPendingTimes();
        }

        function loadPendingTimes() {
            const q = query(
                collection(db, 'tiempos_viaje'),
                where('verificado', '==', false)
            );

            unsubscribePending = onSnapshot(q, (snapshot) => {
                pendingCount.textContent = snapshot.size;

                if (snapshot.empty) {
                    pendingList.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                            <p>No hay tiempos pendientes de verificación.</p>
                            <p>¡Todo está al día!</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                snapshot.forEach((docSnapshot) => {
                    const data = docSnapshot.data();
                    const docId = docSnapshot.id;
                    
                    let fechaStr = 'Fecha no disponible';
                    if (data.fecha) {
                        const fecha = data.fecha.toDate();
                        fechaStr = fecha.toLocaleDateString('es-ES', {
                            day: '2-digit',
                            month: 'long',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                    }

                    html += `
                        <div class="pending-item" id="item-${docId}">
                            <div class="pending-item-header">
                                <div class="pending-item-info">
                                    <h4>${escapeHtml(data.usuario)}</h4>
                                    <span class="route">${escapeHtml(data.ruta)}</span>
                                </div>
                                <div class="pending-item-time">${escapeHtml(data.tiempo_formateado)}</div>
                            </div>
                            <img class="pending-item-image" src="${data.foto_url}" alt="Captura de ${escapeHtml(data.usuario)}">
                            <p class="pending-item-date">Enviado el ${fechaStr}</p>
                            <div class="pending-item-actions">
                                <button class="action-btn approve" onclick="approveTime('${docId}')">
                                    Aprobar
                                </button>
                                <button class="action-btn reject" onclick="rejectTime('${docId}', '${data.foto_url.replace(/'/g, "\\'")}')">
                                    Rechazar
                                </button>
                            </div>
                        </div>
                    `;
                });

                pendingList.innerHTML = html;
            }, (error) => {
                console.error('Error loading pending times:', error);
                pendingList.innerHTML = `
                    <div class="empty-state">
                        <p>Error al cargar los tiempos pendientes.</p>
                    </div>
                `;
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Global functions for approve/reject
        window.approveTime = async function(docId) {
            const item = document.getElementById(`item-${docId}`);
            const buttons = item.querySelectorAll('.action-btn');
            buttons.forEach(btn => btn.disabled = true);

            try {
                await updateDoc(doc(db, 'tiempos_viaje', docId), {
                    verificado: true
                });
            } catch (error) {
                console.error('Error approving:', error);
                alert('Error al aprobar el tiempo. Inténtalo de nuevo.');
                buttons.forEach(btn => btn.disabled = false);
            }
        };

        window.rejectTime = async function(docId, fotoUrl) {
            if (!confirm('¿Estás seguro de que quieres rechazar y eliminar este tiempo?')) {
                return;
            }

            const item = document.getElementById(`item-${docId}`);
            const buttons = item.querySelectorAll('.action-btn');
            buttons.forEach(btn => btn.disabled = true);

            try {
                // Delete from Firestore
                await deleteDoc(doc(db, 'tiempos_viaje', docId));

                // Try to delete from Storage
                try {
                    // Extract path from URL
                    const url = new URL(fotoUrl);
                    const pathMatch = url.pathname.match(/\/o\/(.+)\?/);
                    if (pathMatch) {
                        const storagePath = decodeURIComponent(pathMatch[1]);
                        console.log('Attempting to delete storage path:', storagePath);
                        const storageRef = ref(storage, storagePath);
                        await deleteObject(storageRef);
                        console.log('Successfully deleted from storage');
                    }
                } catch (storageError) {
                    console.warn('Could not delete image from storage:', storageError);
                    // Continue even if image deletion fails
                }

            } catch (error) {
                console.error('Error rejecting:', error);
                alert('Error al rechazar el tiempo. Inténtalo de nuevo.');
                buttons.forEach(btn => btn.disabled = false);
            }
        };
    </script>
</body>
</html>
