<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | BiciFastness</title>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        :root { --bg-main: #121212; --bg-card: #1a1a1a; --bg-input: #222; --text-main: #f1efeb; --text-muted: #888; --border: #333; --primary: #0071c3; --nav-bg: rgba(10,10,10,0.9); }
        [data-theme="light"] { --bg-main: #f0f2f5; --bg-card: #ffffff; --bg-input: #f0f0f0; --text-main: #111; --text-muted: #555; --border: #ddd; --primary: #0071c3; --nav-bg: rgba(255,255,255,0.9); }
        
        body { margin: 0; padding: 0; padding-bottom: 70px; background-color: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; transition: all 0.3s;}
        nav { background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .brand { color: var(--primary); font-weight: 800; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        nav .links a { color: var(--text-muted); text-decoration: none; margin-left: 20px; font-weight: 600; }
        nav .links a.active { color: var(--text-main); }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        .card { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        h2 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        .profile-header { text-align: center; margin-bottom: 20px; }
        .pfp { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 10px; cursor: pointer; transition: 0.2s;}
        .pfp:hover { opacity: 0.8; }
        .pfp-input { display: none; }
        .username { font-size: 1.5rem; font-weight: 800; margin: 0;}
        .email { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 20px;}
        
        .stat-box { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .stat-num { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;}
        
        .theme-box { cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-align: left; transition: border-color 0.3s; }
        .theme-box:hover { border-color: var(--primary); }
        #theme-icon { display: flex; align-items: center; color: var(--primary); } /* Color del icono estrella */

        .trip-item { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .trip-time { font-weight: 800; color: var(--primary); }
        .status-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: #332b00; color: #ffbb33; } .status-verified { background: #003311; color: #00C851; }
        [data-theme="light"] .status-pending { background: #fff8e1; border: 1px solid #ffbb33; }
        [data-theme="light"] .status-verified { background: #e8f5e9; border: 1px solid #00C851; }
        
        .btn-logout { width: 100%; padding: 12px; background: transparent; border: 1px solid #ff4444; color: #ff4444; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px;}
        .btn-logout:hover { background: #ff4444; color: white; }

        .bottom-nav { display: none; }
        @media (max-width: 768px) { nav .links { display: none; } .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border); z-index: 1000; justify-content: space-around; padding: 10px 0; padding-bottom: env(safe-area-inset-bottom); } .bottom-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.75rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 6px; } .bottom-nav a.active { color: var(--primary); } .bottom-nav a i { font-size: 1.4rem; line-height:1; } }
    </style>
</head>
<body>
    <nav>
        <div class="brand">BiciFastness</div>
        <div class="links"><a href="home.html">Inicio</a><a href="ranking.html">Rankings</a><a href="subir.html">Subir Tiempo</a><a href="profile.html" class="active">Perfil</a></div>
    </nav>
    <div class="container">
        <div class="card">
            <div class="profile-header">
                <label for="pfp-upload">
                    <img src="" id="user-pfp" class="pfp" title="Clic para cambiar foto">
                </label>
                <input type="file" id="pfp-upload" class="pfp-input" accept="image/png, image/jpeg">
                <p id="upload-status" style="font-size:0.7rem; color:var(--text-muted); margin:0;">Clic en la foto para cambiarla</p>
                <div class="username" id="user-name">Cargando...</div>
                <div class="email" id="user-email"></div>
            </div>
            
            <div class="stat-box theme-box" id="theme-toggle-btn">
                <div><div style="font-weight:700; color:var(--text-main);">Aspecto Visual</div><div id="theme-text" style="font-size:0.8rem; color:var(--text-muted);">Modo Oscuro</div></div>
                <div style="font-size:1.5rem;" id="theme-icon"><i class="fi fi-sr-star"></i></div>
            </div>

            <div class="stat-box"><div class="stat-num" id="total-trips">0</div><div class="stat-label">Viajes Subidos</div></div>
            <button class="btn-logout" id="logout-btn">Cerrar Sesión</button>
        </div>
        <div class="card">
            <h2>Mis Viajes</h2>
            <div id="trips-container" style="color:var(--text-muted)">Cargando historial...</div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a href="home.html"><i class="fi fi-sr-home"></i>Inicio</a>
        <a href="ranking.html"><i class="fi fi-sr-ranking-podium-empty"></i>Rankings</a>
        <a href="subir.html"><i class="fi fi-sr-add"></i>Subir</a>
        <a href="profile.html" class="active"><i class="fi fi-sr-user"></i>Perfil</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk", authDomain: "bicifastness.firebaseapp.com", projectId: "bicifastness", messagingSenderId: "656116731421", appId: "1:656116731421:web:a4154d028fe9721c5800f4" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        // Lógica de tema en el perfil con la estrella
        const updateThemeUI = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.getElementById('theme-text').innerText = isDark ? 'Modo Oscuro' : 'Modo Claro';
            document.getElementById('theme-icon').innerHTML = isDark ? '<i class="fi fi-sr-star"></i>' : '<i class="fi fi-rr-star"></i>';
        };
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
        updateThemeUI();

        document.getElementById('theme-toggle-btn').addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeUI();
        });

        let currentU = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) window.location.href = "index.html";
            else {
                currentU = user;
                document.getElementById('user-email').innerText = user.email;
                
                const userDoc = await getDoc(doc(db, "usuarios", user.email));
                if(userDoc.exists()){
                    document.getElementById('user-name').innerText = userDoc.data().username;
                    document.getElementById('user-pfp').src = userDoc.data().avatar;
                }
                loadTrips(user.email);
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        document.getElementById('pfp-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const status = document.getElementById('upload-status');
            status.innerText = "Guardando foto..."; status.style.color = "var(--primary)";
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = ev => {
                const img = new Image(); img.src = ev.target.result;
                img.onload = async () => {
                    const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                    cvs.width = 200; cvs.height = 200; 
                    const min = Math.min(img.width, img.height);
                    const sx = (img.width - min)/2, sy = (img.height - min)/2;
                    ctx.drawImage(img, sx, sy, min, min, 0, 0, 200, 200);
                    const b64 = cvs.toDataURL('image/jpeg', 0.6); 
                    
                    document.getElementById('user-pfp').src = b64;
                    await setDoc(doc(db, "usuarios", currentU.email), { avatar: b64 }, { merge: true });
                    status.innerText = "¡Foto actualizada!"; status.style.color = "#00C851";
                }
            }
        });

        async function loadTrips(email) {
            const c = document.getElementById('trips-container');
            const q = query(collection(db, "tiempos_viaje"), where("email_real", "==", email));
            try {
                const snap = await getDocs(q);
                let arr = []; snap.forEach(d => arr.push(d.data()));
                arr.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
                
                document.getElementById('total-trips').innerText = arr.length;
                c.innerHTML = arr.length ? '' : 'No has subido viajes.';
                
                arr.slice(0, 10).forEach(t => {
                    const sCls = t.verificado ? 'status-verified' : 'status-pending';
                    const sTxt = t.verificado ? 'Verificado' : 'Pendiente';
                    
                    const d = new Date(t.fecha);
                    const month = d.toLocaleString('es-ES', { month: 'long' });
                    const dateString = `${d.getDate()} de ${month.charAt(0).toUpperCase() + month.slice(1)} ${d.getFullYear()}`;
                    
                    c.innerHTML += `
                        <div class="trip-item">
                            <div><div style="font-weight:700">Ruta ${t.ruta}</div><div style="font-size:0.75rem">${dateString}</div></div>
                            <div style="text-align:right"><div class="trip-time">${t.tiempo_formateado}</div><div class="status-badge ${sCls}">${sTxt}</div></div>
                        </div>`;
                });
            } catch (err) {
                c.innerHTML = "Error al cargar. Revisa las reglas de Firebase.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
