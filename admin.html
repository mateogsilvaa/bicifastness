<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | BiciFastness</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        body { margin: 0; padding: 0; background-color: #0d0d0d; color: #f1efeb; font-family: 'Poppins', sans-serif; }
        nav { background: #000; border-bottom: 1px solid #333; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        nav .brand { color: #ffbb33; font-weight: 800; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        nav .links a { color: #888; text-decoration: none; margin-left: 20px; font-size: 0.9rem; transition: color 0.3s; }
        nav .links a:hover { color: #f1efeb; font-weight: 600; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 15px; }
        .header-panel h2 { margin: 0; color: #f1efeb; font-size: 1.8rem; }
        .badge-count { background: #0071c3; color: white; padding: 4px 10px; border-radius: 20px; font-size: 1rem; font-weight: 700; }
        .pending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .admin-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; transition: border-color 0.3s; }
        .admin-card:hover { border-color: #555; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .route-tag { background: #222; border: 1px solid #444; padding: 4px 10px; border-radius: 6px; font-weight: 700; color: #0071c3; }
        .time-tag { font-size: 1.2rem; font-weight: 800; color: #f1efeb; }
        .user-info { font-size: 0.85rem; color: #888; }
        .user-info span { color: #ccc; font-weight: 600; display: block; margin-top: 2px; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        button { padding: 10px; border: none; border-radius: 6px; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.2s, transform 0.1s; font-size: 0.9rem; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-view { grid-column: 1 / -1; background: #222; color: #f1efeb; border: 1px solid #444; }
        .btn-view:hover { background: #333; }
        .btn-approve { background: #00C851; color: #003311; }
        .btn-approve:hover { background: #00e65c; }
        .btn-reject { background: #ff4444; color: #4d0000; }
        .btn-reject:hover { background: #ff6666; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 80vh; border-radius: 8px; border: 2px solid #333; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 2rem; cursor: pointer; font-weight: 800; }
        #empty-msg { color: #888; font-size: 1.1rem; text-align: center; padding: 40px; grid-column: 1 / -1; display: none; }
        #loading-msg { color: #0071c3; font-weight: 700; text-align: center; padding: 40px; }
    </style>
</head>
<body>

    <nav>
        <div class="brand">Admin Panel</div>
        <div class="links">
            <a href="home.html">Volver a Inicio</a>
            <a href="#" id="logout-btn">Salir</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-panel">
            <h2>Tiempos Pendientes</h2>
            <div class="badge-count" id="pending-count">0</div>
        </div>
        <div id="loading-msg">Cargando base de datos...</div>
        <div class="pending-grid" id="pending-grid">
            <div id="empty-msg">No hay viajes pendientes de revisión. ¡Todo al día!</div>
        </div>
    </div>

    <div class="modal" id="photo-modal"><span class="close-modal" id="close-modal">&times;</span><img id="modal-img" src="" alt="Captura del viaje"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk",
            authDomain: "bicifastness.firebaseapp.com",
            projectId: "bicifastness",
            storageBucket: "bicifastness.appspot.com",
            messagingSenderId: "656116731421",
            appId: "1:656116731421:web:a4154d028fe9721c5800f4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "index.html";
            else loadPendingTrips();
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = "index.html");
        });

        async function loadPendingTrips() {
            const grid = document.getElementById('pending-grid');
            const loading = document.getElementById('loading-msg');
            const emptyMsg = document.getElementById('empty-msg');
            const countBadge = document.getElementById('pending-count');

            try {
                const q = query(collection(db, "tiempos_viaje"), where("verificado", "==", false));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = '';
                grid.appendChild(emptyMsg);
                emptyMsg.style.display = 'none';

                let count = 0;
                querySnapshot.forEach((docSnapshot) => {
                    count++;
                    const data = docSnapshot.data();
                    const docId = docSnapshot.id;
                    const dateString = new Date(data.fecha).toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });

                    const card = document.createElement('div');
                    card.className = 'admin-card';
                    card.innerHTML = `
                        <div class="card-header"><div class="route-tag">Ruta ${data.ruta}</div><div class="time-tag">${data.tiempo_formateado}</div></div>
                        <div class="user-info">Piloto: <span>${data.usuario}</span>Fecha: <span>${dateString}</span></div>
                        <button class="btn-view view-photo" data-url="${data.foto_url}">📷 Ver Captura</button>
                        <div class="actions">
                            <button class="btn-reject reject-btn" data-id="${docId}" data-url="${data.foto_url}">Rechazar</button>
                            <button class="btn-approve approve-btn" data-id="${docId}">Aprobar</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                loading.style.display = 'none';
                countBadge.innerText = count;
                if (count === 0) emptyMsg.style.display = 'block';
                else attachEventListeners();

            } catch (error) {
                console.error(error);
                loading.innerText = "Error cargando datos. Revisa si tienes permisos de Admin.";
                loading.style.color = "#ff4444";
            }
        }

        function attachEventListeners() {
            document.querySelectorAll('.view-photo').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.getElementById('modal-img').src = e.currentTarget.getAttribute('data-url');
                    document.getElementById('photo-modal').style.display = 'flex';
                });
            });

            document.querySelectorAll('.approve-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const docId = e.currentTarget.getAttribute('data-id');
                    e.currentTarget.disabled = true; e.currentTarget.innerText = "...";
                    try { await updateDoc(doc(db, "tiempos_viaje", docId), { verificado: true }); loadPendingTrips(); }
                    catch (err) { alert("Error al aprobar: " + err.message); e.currentTarget.disabled = false; e.currentTarget.innerText = "Aprobar"; }
                });
            });

            document.querySelectorAll('.reject-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    if(!confirm("¿Seguro que quieres borrar este tiempo para siempre?")) return;
                    const docId = e.currentTarget.getAttribute('data-id');
                    const photoUrl = e.currentTarget.getAttribute('data-url');
                    e.currentTarget.disabled = true; e.currentTarget.innerText = "...";
                    try {
                        try {
                            const decodedUrl = decodeURIComponent(photoUrl);
                            const pathMatch = decodedUrl.match(/o\/(.+?)\?/);
                            if (pathMatch && pathMatch[1]) await deleteObject(ref(storage, pathMatch[1]));
                        } catch (storageErr) { console.warn("La imagen no existía en Storage.", storageErr); }
                        await deleteDoc(doc(db, "tiempos_viaje", docId));
                        loadPendingTrips();
                    } catch (err) { alert("Error al rechazar: " + err.message); e.currentTarget.disabled = false; e.currentTarget.innerText = "Rechazar"; }
                });
            });
        }

        document.getElementById('close-modal').addEventListener('click', () => document.getElementById('photo-modal').style.display = 'none');
        document.getElementById('photo-modal').addEventListener('click', (e) => { if (e.target.id === 'photo-modal') document.getElementById('photo-modal').style.display = 'none'; });
    </script>
</body>
</html>
