<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir | BiciFastness</title>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-straight/css/uicons-solid-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-channeled/css/uicons-solid-channeled.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-straight/css/uicons-bold-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        :root { --bg-main: #121212; --bg-card: #1a1a1a; --bg-input: #222; --text-main: #f1efeb; --text-muted: #888; --border: #333; --primary: #0071c3; --nav-bg: rgba(10,10,10,0.9); }
        [data-theme="light"] { --bg-main: #f0f2f5; --bg-card: #ffffff; --bg-input: #f0f0f0; --text-main: #111; --text-muted: #555; --border: #ddd; --primary: #0071c3; --nav-bg: rgba(255,255,255,0.9); }
        
        body { margin: 0; padding: 0; padding-bottom: 70px; background-color: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; transition: all 0.3s; }
        
        nav { background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .brand { color: var(--primary); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px; text-decoration: none; display: flex; align-items: center; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        nav .links a { color: var(--text-muted); text-decoration: none; margin-left: 15px; font-weight: 600; }
        nav .links a.active, nav .links a:hover { color: var(--text-main); }
        .info-icon { color: var(--text-muted); font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; text-decoration: none; line-height: 0; margin-top: -3px; }
        .info-icon:hover { color: var(--primary); }
        
        .container { max-width: 500px; margin: 30px auto; padding: 0 20px; }
        .card { background: var(--bg-card); padding: 2rem; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 5px 15px rgba(0,0,0,0.05); box-sizing: border-box; width: 100%;}
        h2 { margin-top: 0; color: var(--text-main); font-weight: 800; border-bottom: 2px solid var(--primary); padding-bottom: 10px; display: inline-block; }
        
        .form-group { margin-bottom: 15px; width: 100%;}
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; font-weight: 600;}
        .row { display: flex; gap: 15px; flex-wrap: wrap; }
        .row > div { flex: 1 1 calc(50% - 15px); min-width: 120px; box-sizing: border-box; }
        
        input { width: 100%; max-width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; box-sizing: border-box; font-family: inherit; transition: border 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .station-name { font-size: 0.75rem; color: var(--primary); margin-top: 4px; font-weight: 600; min-height: 16px; }

        .file-drop-area { position: relative; display: flex; align-items: center; justify-content: center; width: 100%; padding: 25px; border: 2px dashed var(--border); border-radius: 8px; background: var(--bg-input); transition: 0.3s; cursor: pointer; text-align: center; box-sizing: border-box;}
        .file-drop-area:hover { border-color: var(--primary); }
        .file-msg { color: var(--text-muted); font-size: 0.9rem; font-weight: 600;}
        .file-input { position: absolute; left: 0; top: 0; height: 100%; width: 100%; cursor: pointer; opacity: 0; }
        
        button { width: 100%; padding: 14px; margin-top: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: background 0.3s, transform 0.1s; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #status-msg { margin-top: 15px; font-size: 0.9rem; text-align: center; font-weight: 600; }
        
        .bottom-nav { display: none; }
        @media (max-width: 850px) { 
            nav .links { display: none; } 
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg-card); border-top: 1px solid var(--border); z-index: 1000; justify-content: space-between; padding: 8px 5px; padding-bottom: calc(8px + env(safe-area-inset-bottom)); box-sizing: border-box;} 
            .bottom-nav a { color: var(--text-muted); text-decoration: none; font-size: 0.6rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; text-align: center; } 
            .bottom-nav a.active { color: var(--primary); } 
            .bottom-nav a i { font-size: 1.25rem; line-height: 1; } 
        }
    </style>
</head>
<body>
    <nav>
        <a href="home.html" class="brand"><img src="images/logo.png" alt="BICIFASTNESS" onerror="this.outerHTML='BICIFASTNESS'"></a>
        <div class="nav-right">
            <div class="links">
                <a href="home.html">Inicio</a>
                <a href="ranking.html">Rankings</a>
                <a href="bicirating.html">BiciRating</a>
                <a href="mapa.html">Mapa</a>
                <a href="clanes.html">Clanes</a>
                <a href="subir.html" class="active">Subir</a>
                <a href="profile.html">Perfil</a>
            </div>
            <a href="info.html" class="info-icon" title="Cómo funciona"><i class="fi fi-bs-info"></i></a>
        </div>
    </nav>

    <div class="bottom-nav">
        <a href="home.html"><i class="fi fi-sr-home"></i>Inicio</a>
        <a href="ranking.html"><i class="fi fi-sr-leaderboard"></i>Rankings</a>
        <a href="bicirating.html"><i class="fi fi-sr-ranking-star"></i>Rating</a>
        <a href="subir.html" class="active"><i class="fi fi-sr-add"></i>Subir</a>
        <a href="mapa.html"><i class="fi fi-ss-map-marker"></i>Mapa</a>
        <a href="clanes.html"><i class="fi fi-sr-team-check-alt"></i>Clanes</a>
        <a href="profile.html"><i class="fi fi-sr-user"></i>Perfil</a>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>Registrar Viaje</h2>
            <div class="row">
                <div class="form-group">
                    <label>Salida</label>
                    <input type="text" id="origen" placeholder="Ej: 25A" maxlength="4">
                    <div id="origen-name" class="station-name"></div>
                </div>
                <div class="form-group">
                    <label>Meta</label>
                    <input type="text" id="destino" placeholder="Ej: 180" maxlength="4">
                    <div id="destino-name" class="station-name"></div>
                </div>
            </div>
            <div class="row">
                <div class="form-group"><label>Minutos</label><input type="number" id="min" placeholder="00"></div>
                <div class="form-group"><label>Segundos</label><input type="number" id="sec" placeholder="00"></div>
            </div>
            <div class="form-group"><label>Fecha</label><input type="date" id="fecha"></div>
            <div class="form-group">
                <label>Captura Verificación</label>
                <div class="file-drop-area" id="drop-area"><span class="file-msg" id="file-msg">Arrastra o haz clic 📷</span><input class="file-input" type="file" id="foto" accept="image/png, image/jpeg"></div>
            </div>
            <button id="submit-btn">Enviar</button>
            <div id="status-msg"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk", authDomain: "bicifastness.firebaseapp.com", projectId: "bicifastness", messagingSenderId: "656116731421", appId: "1:656116731421:web:a4154d028fe9721c5800f4" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
        let currentUser = null;
        let myClanId = null;

        // Pillamos la estación de la URL si venimos del mapa
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('origen')) document.getElementById('origen').value = urlParams.get('origen');

        onAuthStateChanged(auth, async (user) => { 
            if (!user) window.location.href = "index.html"; 
            else {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "usuarios", user.email));
                if(userDoc.exists()) myClanId = userDoc.data().clanId || null;
            }
        });

        // ! IMPORTANTE: PEGA AQUÍ TU rawStations COMPLETO CON LAS 600 ESTACIONES
        const rawStations = `2 - Metro Callao\n3 - Plaza Conde Suchil\n4 - Malasaña\n5 - Fuencarral`; 

        const estacionesMap = {};
        rawStations.split('\n').forEach(line => {
            if(!line.trim()) return;
            let parts = line.split(' - '); let rawNum = parts[0].trim(); let name = parts.slice(1).join(' - ').trim();
            let match = rawNum.match(/^(\d+)([A-Z]?)$/i);
            if(match) {
                let n = match[1]; let l = match[2].toUpperCase() || '';
                if(n.length < 3) n = n.padStart(3, '0');
                estacionesMap[n + l] = name;
            } else { estacionesMap[rawNum] = name; }
        });

        function formatStationInput(e) {
            let val = e.target.value.trim().toUpperCase();
            let match = val.match(/^(\d+)([A-Z]?)$/);
            if(match) {
                let n = match[1]; let l = match[2] || '';
                if(n.length < 3) n = n.padStart(3, '0');
                val = n + l;
            }
            e.target.value = val;
            let nameDiv = document.getElementById(e.target.id + '-name');
            nameDiv.innerText = estacionesMap[val] ? "📍 " + estacionesMap[val] : (val ? "❌ Estación no encontrada" : "");
            nameDiv.style.color = estacionesMap[val] ? "var(--primary)" : "#ff4444";
        }
        document.getElementById('origen').addEventListener('blur', formatStationInput);
        document.getElementById('destino').addEventListener('blur', formatStationInput);
        // Formatear si viene de URL
        if(document.getElementById('origen').value) formatStationInput({target: document.getElementById('origen')});

        const fileInput = document.getElementById('foto');
        fileInput.addEventListener('change', () => { document.getElementById('file-msg').innerText = fileInput.files.length > 0 ? fileInput.files[0].name : "Arrastra o haz clic 📷"; });

        function comprimirImagen(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                        const scale = 500 / img.width; cvs.width = 500; cvs.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, cvs.width, cvs.height);
                        resolve(cvs.toDataURL('image/jpeg', 0.5));
                    };
                };
            });
        }

        const btn = document.getElementById('submit-btn');
        btn.addEventListener('click', async () => {
            const org = document.getElementById('origen').value; const dst = document.getElementById('destino').value;
            const m = parseInt(document.getElementById('min').value); const s = parseInt(document.getElementById('sec').value);
            const date = document.getElementById('fecha').value; const file = fileInput.files[0];
            const msg = document.getElementById('status-msg');

            if(!org || !dst || isNaN(m) || isNaN(s) || !date || !file) { msg.innerText = "Rellena todo."; msg.style.color = "red"; return; }
            if(!estacionesMap[org] || !estacionesMap[dst]) { msg.innerText = "Hay estaciones inválidas."; msg.style.color = "red"; return; }
            
            try {
                btn.disabled = true; msg.innerText = "Subiendo..."; msg.style.color = "var(--primary)";
                const b64 = await comprimirImagen(file);
                
                // MÓDULO DE VELOCIDAD Y KILÓMETROS (Estimador local)
                // Como no tenemos Lat/Lon de todo Madrid, estimamos la distancia por el ID de estación (para que funcione 100% gratis y rápido)
                let numO = parseInt(org.replace(/\D/g,'')) || 1;
                let numD = parseInt(dst.replace(/\D/g,'')) || 1;
                let distanciaKmAprox = ((Math.abs(numO - numD) * 0.08) + 0.5).toFixed(2); // Fórmula pseudo-realista
                let tiempoTotalSegundos = (m * 60) + s;
                let horasTotal = tiempoTotalSegundos / 3600;
                let velMediaKmh = (distanciaKmAprox / horasTotal).toFixed(1);

                await addDoc(collection(db, "tiempos_viaje"), {
                    email_real: currentUser.email,
                    ruta: `${org}-${dst}`,
                    tiempo_segundos: tiempoTotalSegundos,
                    tiempo_formateado: `${m.toString().padStart(2,'0')}m. ${s.toString().padStart(2,'0')}s.`,
                    fecha: new Date(date + 'T00:00:00').toISOString(),
                    foto_url: b64,
                    distancia_km: parseFloat(distanciaKmAprox),
                    velocidad_kmh: parseFloat(velMediaKmh),
                    clan_id: myClanId, // Etiquetamos el viaje con el clan del usuario
                    verificado: false 
                });
                
                msg.innerText = `¡Viaje subido! (${distanciaKmAprox} km a ${velMediaKmh} km/h). En revisión.`; 
                msg.style.color = "#00C851";
                document.querySelectorAll('input').forEach(i => i.value = '');
                document.getElementById('origen-name').innerText = ''; document.getElementById('destino-name').innerText = '';
            } catch(err) { msg.innerText = "Error: " + err.message; msg.style.color = "red"; }
            finally { btn.disabled = false; }
        });
    </script>
</body>
</html>
