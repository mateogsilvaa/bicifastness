<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | BiciFastness</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/2.1.0/uicons-bold-straight/css/uicons-bold-straight.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        :root { --bg-main: #0d0d0d; --bg-card: #1a1a1a; --bg-input: #222; --text-main: #f1efeb; --text-muted: #888; --border: #333; --primary: #ffbb33; }
        
        body { margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main); font-family: 'Poppins', sans-serif; transition: all 0.3s; }
        
        nav { background: #000; border-bottom: 1px solid var(--border); padding: 10px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav .brand { display: flex; align-items: center; text-decoration: none; color: var(--primary); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 2px;}
        nav .brand img { height: 35px; width: auto; display: block; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        nav .links { display: flex; align-items: center; }
        nav .links a { color: var(--text-muted); text-decoration: none; margin-left: 20px; font-weight: 600; transition: color 0.3s; line-height: 1; }
        nav .links a:hover { color: var(--text-main); }
        .info-icon { color: var(--text-muted); font-size: 1.4rem; display: flex; align-items: center; justify-content: center; transition: color 0.3s; text-decoration: none; line-height: 0; margin-top: -3px; }
        .info-icon:hover { color: var(--primary); }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid var(--border); padding-bottom: 15px; flex-wrap: wrap; gap: 15px;}
        .title-group { display: flex; align-items: center; gap: 15px; }
        .badge-count { background: #0071c3; padding: 4px 10px; border-radius: 20px; font-weight: 700; color: white;}
        
        .bot-toggle { display: flex; align-items: center; gap: 10px; background: var(--bg-card); padding: 8px 15px; border-radius: 30px; border: 1px solid var(--border); }
        .bot-toggle span { font-weight: 700; font-size: 0.9rem; color: #00C851; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00C851; }
        input:checked + .slider:before { transform: translateX(20px); }

        .pending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .admin-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;}
        .card-header { display: flex; justify-content: space-between; font-weight: 700; color: #0071c3; }
        
        .bot-status { font-size: 0.9rem; font-weight: 600; padding: 12px; border-radius: 8px; background: var(--bg-input); border: 1px solid var(--border); display: none; margin-top: 5px; line-height: 1.4; }
        .bot-status.loading { color: #aaaaaa; border-color: #444; }
        .bot-status.success { color: #00C851; border-color: #00C851; background: rgba(0, 200, 81, 0.1); }
        .bot-status.warning { color: #ffbb33; border-color: #ffbb33; background: rgba(255, 187, 51, 0.1); }
        .bot-status.danger { color: #ff4444; border-color: #ff4444; background: rgba(255, 68, 68, 0.1); }

        button { padding: 10px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-view { background: #222; color: #fff; border: 1px solid #444; width: 100%; }
        .actions { display: flex; gap: 10px; margin-top: 10px;} .actions button {flex: 1;}
        .btn-approve { background: #00C851; color: #003311; } .btn-reject { background: #ff4444; color: #4d0000; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal img { max-width: 90%; max-height: 80vh; border-radius: 8px; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 2rem; cursor: pointer; font-weight: 800; }

        /* FIX PARA CENTRAR LAS INSIGNIAS (por si acaso) */
        .contenedor-insignias { justify-content: center !important; }

        /* ESTILOS PARA EL GESTOR DE INSIGNIAS Y BUSCADOR LIVE */
        .badges-manager-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .badge-row { display: flex; justify-content: space-between; align-items: center; background: var(--bg-input); padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border); }
        .badge-info { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 600; }
        .badge-icon { font-size: 1.2rem; }

        .search-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; max-height: 250px; overflow-y: auto; z-index: 100; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 5px; }
        .search-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 600;}
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: var(--bg-input); color: var(--primary); }
    </style>
</head>
<body>
    <nav>
        <a href="home.html" class="brand">
            <img src="images/logo.png" alt="BICIFASTNESS" onerror="this.outerHTML='BICIFASTNESS'">
        </a>
        <div class="nav-right">
            <div class="links"><a href="home.html">Volver a Inicio</a></div>
            <a href="info.html" class="info-icon" title="Cómo funciona"><i class="fi fi-bs-info"></i></a>
        </div>
    </nav>

    <div class="container">
        
        <div class="admin-card" style="margin-bottom: 20px;">
            <div class="card-header"><span style="color:#FFD700;">🔥 Destacar Ruta de la Semana</span></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="highlight-input" placeholder="Ej: 045-162" style="width:100%; padding:10px; border-radius:6px; background:var(--bg-input); border:1px solid var(--border); color:var(--text-main); font-family:inherit;">
                <button id="highlight-btn" style="background:#FFD700; color:#111;">Destacar Ruta</button>
            </div>
        </div>

        <div class="admin-card" style="margin-bottom: 40px; border-color: #9C27B0;">
            <div class="card-header"><span style="color:#E040FB;">🏅 Gestor de Insignias</span></div>
            <p style="font-size:0.85rem; color:var(--text-muted); margin: 5px 0 15px 0;">Escribe el <b>nombre</b> de cualquier piloto o clan. Los resultados aparecerán al instante.</p>
            
            <div style="position: relative; margin-bottom:15px;">
                <input type="text" id="badge-live-search" placeholder="Buscar por nombre..." style="width:100%; padding:12px; border-radius:6px; background:var(--bg-input); border:1px solid var(--border); color:var(--text-main); font-family:inherit; outline:none;">
                <div id="badge-search-results" class="search-dropdown"></div>
            </div>

            <div id="badge-target-name" style="font-weight: 800; font-size: 1.1rem; color: #E040FB; margin-bottom: 10px; display: none;">Editando a: <span></span></div>
            
            <div class="badges-manager-grid" id="badges-grid" style="display: none;">
                </div>
        </div>

        <div class="header-panel">
            <div class="title-group">
                <h2 style="margin:0;">Pendientes</h2>
                <div class="badge-count" id="pending-count">0</div>
            </div>
            <div class="bot-toggle">
                <span>🤖 Bot Verificador Simple</span>
                <label class="switch">
                    <input type="checkbox" id="bot-switch">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <div class="pending-grid" id="pending-grid" style="margin-bottom: 40px;"></div>

        <div class="header-panel" style="border-bottom-color: #ff4444;">
            <div class="title-group">
                <h2 style="margin:0; color:#ff4444;"><i class="fi fi-sr-flag"></i> Viajes Reportados</h2>
                <div class="badge-count" id="reports-count" style="background: #ff4444;">0</div>
            </div>
        </div>
        <div class="pending-grid" id="reports-grid"></div>

    </div>
    
    <div class="modal" id="photo-modal"><span class="close-modal" id="close-modal">&times;</span><img id="modal-img"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // IMPORTAR DICCIONARIO DE INSIGNIAS
        import { DICCIONARIO_INSIGNIAS } from './insignias.js';

        const firebaseConfig = { apiKey: "AIzaSyBG9QdjEG9Qmg27Dy05t0eVcVFMMPpSyVk", authDomain: "bicifastness.firebaseapp.com", projectId: "bicifastness", messagingSenderId: "656116731421", appId: "1:656116731421:web:a4154d028fe9721c5800f4" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        let isBotActive = false; let botQueue = []; let isProcessingQueue = false;

        document.getElementById('bot-switch').addEventListener('change', (e) => {
            isBotActive = e.target.checked;
            if(isBotActive) { document.querySelectorAll('.bot-status').forEach(el => el.style.display = 'block'); processBotQueue(); } 
            else { document.querySelectorAll('.bot-status').forEach(el => { el.style.display = 'none'; el.className = 'bot-status'; }); }
        });

        // ------------------ LÓGICA DEL BOT DE IA VISUAL (GEMINI) SEGURO ------------------
        async function processBotQueue() {
            if(isProcessingQueue || !isBotActive || botQueue.length === 0) return;
            isProcessingQueue = true;

            const trip = botQueue.shift();
            const statusEl = document.getElementById(`bot-${trip.id}`);
            
            if(statusEl && isBotActive) {
                statusEl.className = 'bot-status loading';
                statusEl.innerHTML = '🤖 Analizando imagen con Gemini IA (Modo Auditor Forense Integral)...';
                
                try {
                    // 1. OBTENER LA API KEY DE FORMA SEGURA DESDE FIRESTORE
                    const secretDoc = await getDoc(doc(db, "secrets", "api_keys"));
                    if (!secretDoc.exists()) throw new Error("API Key no encontrada en la base de datos.");
                    const apiKey = secretDoc.data().gemini; 
                    
                    // Preparamos la imagen (base64)
                    const base64Data = trip.foto_url.split(',')[1];
                    const mimeType = trip.foto_url.match(/data:(.*?);/)[1];

                    // Le damos las NUEVAS instrucciones a la IA
                    const prompt = `Eres un auditor forense digital experto en detectar manipulación de imágenes de la app BiciMAD. Analiza la captura de pantalla minuciosamente.

                    1. INSPECCIÓN VISUAL OBLIGATORIA (Píxeles y Diseño):
                       - Examina las fuentes (fonts) del texto gris de las horas y fechas (ej: '18:00:00'). ¿El renderizado de los píxeles y el grosor de la letra son idénticos al resto del texto gris estable de la interfaz, o parecen texto superpuesto posteriormente?
                       - Revisa la alineación. ¿Están las horas perfectamente centradas bajo los pins, o hay desviaciones sospechosas?
                       - ¡NUEVO AJUSTE IMPORTANTE!: Acepta como VÁLIDO el formato redundante de estación "Número - Nombre (Número)".

                    2. EXTRACCIÓN DE DATOS (Solo si la inspección visual es aprobada):
                       - Extrae número estación origen.
                       - Extrae número estación destino.
                       - Extrae duración total azul en segundos.
                       - Extrae hora salida gris (HH:MM:SS).
                       - Extrae hora llegada gris (HH:MM:SS).

                    3. RESPUESTA:
                       Devuelve ÚNICAMENTE un objeto JSON válido.
                       Estructura si la imagen es falsa VISUALMENTE:
                       {"visual_integrity": false, "manipulation_details": "Detalles cortos de lo detectado"}

                       Estructura si la imagen parece genuina visualmente:
                       {"visual_integrity": true, "origen": "numero", "destino": "numero", "segundos_azul": numero, "hora_salida": "HH:MM:SS", "hora_llegada": "HH:MM:SS", "es_bicimad": true}

                       Si no parece ser un ticket de BiciMAD:
                       {"es_bicimad": false, "visual_integrity": false}

                    No añadas markdown ni texto extra.`;

                    const requestBody = {
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: mimeType, data: base64Data } }
                            ]
                        }]
                    };

                    const modelsResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    if (!modelsResponse.ok) throw new Error("Error obteniendo la lista de modelos de Google.");
                    
                    const modelsData = await modelsResponse.json();
                    const availableModels = modelsData.models.filter(m => 
                        m.supportedGenerationMethods.includes("generateContent") && m.name.includes("flash")
                    );

                    if (availableModels.length === 0) throw new Error("Google no ha habilitado ningún modelo 'flash' para esta API Key.");
                    const exactModelName = availableModels[0].name; 

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${exactModelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody)
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || "Error HTTP " + response.status);
                    }

                    const data = await response.json();
                    let jsonText = data.candidates[0].content.parts[0].text;
                    jsonText = jsonText.replace(/```json/g, '').replace(/```/g, '').trim();
                    const aiResult = JSON.parse(jsonText);

                    if (aiResult.es_bicimad === false) {
                        statusEl.className = 'bot-status danger';
                        statusEl.innerHTML = `🔴 <b>FALSO:</b> La IA determina que la imagen no es de BiciMAD.`;
                    } else if (aiResult.visual_integrity === false) {
                        statusEl.className = 'bot-status danger';
                        statusEl.innerHTML = `🔴 <b>FALSIFICACIÓN VISUAL DETECTADA:</b><br>Motivo: <b>${aiResult.manipulation_details}</b>.`;
                    } else if (aiResult.visual_integrity === true) {
                        const parseTime = (timeStr) => {
                            if (!timeStr || !timeStr.includes(':')) return 0;
                            const [h, m, s] = timeStr.split(':').map(Number);
                            return (h * 3600) + (m * 60) + s;
                        };

                        const secSalida = parseTime(aiResult.hora_salida);
                        const secLlegada = parseTime(aiResult.hora_llegada);
                        
                        let diferencia_matematica = secLlegada - secSalida;
                        if (diferencia_matematica < 0) diferencia_matematica += 24 * 3600;

                        const discrepancia_foto = Math.abs(diferencia_matematica - aiResult.segundos_azul);
                        const origClaimed = String(trip.ruta.split('-')[0]).replace(/^0+/, '').trim();
                        const destClaimed = String(trip.ruta.split('-')[1]).replace(/^0+/, '').trim();

                        const origMatches = String(aiResult.origen).trim() === origClaimed;
                        const destMatches = String(aiResult.destino).trim() === destClaimed;
                        const timeDiffUser = Math.abs(aiResult.segundos_azul - trip.tiempo_segundos);
                        const timeMatchesUser = timeDiffUser <= 5; 

                        if (discrepancia_foto > 2) {
                            statusEl.className = 'bot-status danger';
                            statusEl.innerHTML = `🔴 <b>FALSIFICACIÓN MATEMÁTICA DETECTADA:</b><br>Diferencia real entre horas: <b>${diferencia_matematica}s</b>.<br>El recuadro azul ha sido manipulado a <b>${aiResult.segundos_azul}s</b>.`;
                        } else if (origMatches && destMatches && timeMatchesUser) {
                            statusEl.className = 'bot-status success';
                            statusEl.innerHTML = `🟢 <b>VERIFICADO (AUDITORÍA COMPLETA):</b> Ruta ${aiResult.origen}-${aiResult.destino} en ${aiResult.segundos_azul}s.`;
                        } else {
                            statusEl.className = 'bot-status danger';
                            statusEl.innerHTML = `🔴 <b>DISCREPANCIA CON EL USUARIO:</b><br>La IA ha leído en la foto: Ruta <b>${aiResult.origen}-${aiResult.destino}</b> en <b>${aiResult.segundos_azul}s</b>.<br>El usuario introdujo: Ruta <b>${origClaimed}-${destClaimed}</b> en <b>${trip.tiempo_segundos}s</b>.`;
                        }
                    }

                } catch (error) {
                    console.error("Error en Bot IA:", error);
                    statusEl.className = 'bot-status warning';
                    statusEl.innerHTML = '🟠 <b>Error:</b> ' + error.message;
                }
            }
            isProcessingQueue = false; if(isBotActive) processBotQueue(); 
        }

        // ------------------ AUTENTICACIÓN E INICIO DE ADMIN ------------------
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "home.html"; return; }
            const userDoc = await getDoc(doc(db, "usuarios", user.email));
            if (userDoc.exists() && userDoc.data().isAdmin === true) {
                loadPendingTrips(); 
                loadCurrentHighlighted();
                loadAllForSearch();
                loadReports(); // Cargamos los reportes al entrar
            } else { alert("Acceso denegado."); window.location.href = "home.html"; }
        });

        // ------------------ LÓGICA GESTOR DE INSIGNIAS ------------------
        let globalAdminUsers = [];
        let globalAdminClans = [];
        let currentBadgeTargetId = null;
        let currentBadgeTargetType = null;
        let targetLogrosData = [];

        async function loadAllForSearch() {
            const uSnap = await getDocs(collection(db, "usuarios"));
            uSnap.forEach(d => {
                let data = d.data();
                globalAdminUsers.push({ id: d.id, name: data.username || d.id, type: 'usuarios', data: data });
            });
            const cSnap = await getDocs(collection(db, "clanes"));
            cSnap.forEach(d => {
                let data = d.data();
                globalAdminClans.push({ id: d.id, name: data.nombre || d.id, type: 'clanes', data: data });
            });
        }

        document.getElementById('badge-live-search').addEventListener('input', (e) => {
            const term = e.target.value.trim().toLowerCase();
            const resDiv = document.getElementById('badge-search-results');
            if(!term) { resDiv.style.display = 'none'; return; }

            let results = [];
            globalAdminUsers.forEach(u => { if(u.name.toLowerCase().includes(term)) results.push(u); });
            globalAdminClans.forEach(c => { if(c.name.toLowerCase().includes(term)) results.push(c); });

            resDiv.innerHTML = '';
            if(results.length === 0) {
                resDiv.innerHTML = '<div style="padding:10px; color:#888;">No hay resultados</div>';
            } else {
                results.slice(0, 10).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'search-item';
                    const icon = item.type === 'usuarios' ? '👤 Piloto' : '🛡️ Clan';
                    div.innerHTML = `<span>${item.name}</span><span style="color:#888; font-size:0.8rem;">${icon}</span>`;
                    div.onclick = () => selectBadgeTarget(item);
                    resDiv.appendChild(div);
                });
            }
            resDiv.style.display = 'block';
        });

        document.addEventListener('click', (e) => {
            if(e.target.id !== 'badge-live-search') {
                document.getElementById('badge-search-results').style.display = 'none';
            }
        });

        async function selectBadgeTarget(item) {
            document.getElementById('badge-live-search').value = '';
            document.getElementById('badge-search-results').style.display = 'none';
            
            currentBadgeTargetId = item.id;
            currentBadgeTargetType = item.type;
            
            const targetDoc = await getDoc(doc(db, item.type, item.id));
            if(!targetDoc.exists()) return;
            
            const data = targetDoc.data();
            targetLogrosData = data.logros || [];

            const nameLabel = document.getElementById('badge-target-name');
            nameLabel.innerHTML = `Editando a: <span>${item.name}</span> <span style="font-size:0.8rem; color:#888;">(${item.type === 'usuarios' ? 'Piloto' : 'Clan'})</span>`;
            nameLabel.style.display = 'block';

            const grid = document.getElementById('badges-grid');
            grid.innerHTML = '';
            for (const [badgeId, badgeInfo] of Object.entries(DICCIONARIO_INSIGNIAS)) {
                const isChecked = targetLogrosData.includes(badgeId);
                grid.innerHTML += `
                    <div class="badge-row">
                        <div class="badge-info">
                            <i class="${badgeInfo.icono} badge-icon" style="color: ${badgeInfo.color};"></i>
                            <span>${badgeInfo.titulo}</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" class="badge-toggle" data-badge-id="${badgeId}" ${isChecked ? 'checked' : ''}>
                            <span class="slider"></span>
                        </label>
                    </div>
                `;
            }

            document.querySelectorAll('.badge-toggle').forEach(chk => {
                chk.addEventListener('change', async (e) => {
                    const bId = e.target.getAttribute('data-badge-id');
                    const isAdding = e.target.checked;
                    
                    try {
                        const ref = doc(db, currentBadgeTargetType, currentBadgeTargetId);
                        let newArray = [...targetLogrosData];
                        
                        if (isAdding && !newArray.includes(bId)) newArray.push(bId);
                        else if (!isAdding) newArray = newArray.filter(i => i !== bId);

                        await updateDoc(ref, { logros: newArray });
                        targetLogrosData = newArray; 
                    } catch(err) {
                        alert("Error al guardar la insignia.");
                        e.target.checked = !isAdding; 
                    }
                });
            });

            grid.style.display = 'grid';
        }

        // ------------------ DESTACAR RUTA ------------------
        async function loadCurrentHighlighted() { 
            const confDoc = await getDoc(doc(db, "config", "general")); 
            if(confDoc.exists() && confDoc.data().ruta_destacada) {
                document.getElementById('highlight-input').value = confDoc.data().ruta_destacada; 
            }
        }

        document.getElementById('highlight-btn').addEventListener('click', async () => { 
            const btn = document.getElementById('highlight-btn');
            btn.disabled = true; btn.innerText = "Aplicando...";
            
            const newRuta = document.getElementById('highlight-input').value.trim();
            if(!newRuta) { btn.disabled = false; btn.innerText = "Destacar Ruta"; return; }

            const confRef = doc(db, "config", "general");
            const confDoc = await getDoc(confRef);
            let historicas = [];
            let oldDestacada = null;

            if (confDoc.exists()) {
                const data = confDoc.data();
                oldDestacada = data.ruta_destacada;
                historicas = data.rutas_historicas || [];
                if (oldDestacada && oldDestacada !== newRuta && !historicas.includes(oldDestacada)) {
                    historicas.push(oldDestacada);
                }
            }
            
            await setDoc(confRef, { ruta_destacada: newRuta, rutas_historicas: historicas }, { merge: true });

            if (oldDestacada) await recalcularRutaBiciRating(oldDestacada);
            await recalcularRutaBiciRating(newRuta);

            alert("Ruta destacada actualizada y rankings de jugadores recalculados.");
            btn.disabled = false; btn.innerText = "Destacar Ruta";
        });

        // ------------------ CARGAR PENDIENTES ------------------
        async function loadPendingTrips() {
            const grid = document.getElementById('pending-grid');
            const q = query(collection(db, "tiempos_viaje"), where("verificado", "==", false));
            const snap = await getDocs(q);
            grid.innerHTML = ''; let count = 0; botQueue = []; 

            snap.forEach((docSnap) => {
                count++; const data = docSnap.data(); const docId = docSnap.id;
                botQueue.push({ id: docId, foto_url: data.foto_url, ruta: data.ruta, tiempo_segundos: data.tiempo_segundos, email_real: data.email_real });

                grid.innerHTML += `
                    <div class="admin-card" id="card-${docId}">
                        <div class="card-header"><span>Ruta ${data.ruta}</span><span>${data.tiempo_formateado}</span></div>
                        <div style="font-size:0.8rem; color:#888;">Email: ${data.email_real}</div>
                        <div class="bot-status loading" id="bot-${docId}" style="${isBotActive ? 'display:block;' : 'display:none;'}">🤖 En cola...</div>
                        <button class="btn-view view-photo" data-url="${data.foto_url}" style="margin-top:10px;">Ver Captura</button>
                        <div class="actions">
                            <button class="btn-reject reject-btn" data-id="${docId}">Rechazar</button>
                            <button class="btn-approve approve-btn" data-id="${docId}" data-email="${data.email_real}" data-ruta="${data.ruta}">Aprobar</button>
                        </div>
                    </div>`;
            });
            document.getElementById('pending-count').innerText = count;
            if (count === 0) grid.innerHTML = `<div style="grid-column:1/-1; color:#888;">Todo al día.</div>`;
            else { attachEvents(); if(isBotActive) processBotQueue(); }
        }

        // ------------------ NUEVA FUNCIÓN: CARGAR REPORTES DE USUARIOS ------------------
        async function loadReports() {
            const grid = document.getElementById('reports-grid');
            // Buscamos los reportes que estén en estado "pendiente"
            const q = query(collection(db, "reportes"), where("status", "==", "pendiente"));
            const snap = await getDocs(q);
            
            grid.innerHTML = '';
            let count = 0;

            snap.forEach((docSnap) => {
                count++;
                const data = docSnap.data();
                const repId = docSnap.id;

                grid.innerHTML += `
                    <div class="admin-card" style="border-color: #ff4444; background: rgba(255, 68, 68, 0.05);">
                        <div class="card-header" style="color: #ff4444;">
                            <span>🚨 Alerta en Ruta ${data.ruta}</span>
                        </div>
                        <div style="font-size:0.85rem; color:#ccc; margin-top: 10px; line-height: 1.6;">
                            <p style="margin: 0;"><b>Sospechoso:</b> <span style="color:#FFD700">${data.reportedEmail}</span></p>
                            <p style="margin: 0;"><b>Chivato:</b> ${data.reporterEmail}</p>
                            <p style="margin: 0; color:#888; font-size: 0.75rem;">ID de viaje: ${data.tripId}</p>
                        </div>
                        <div class="actions" style="margin-top: 15px;">
                            <button class="btn-reject" onclick="window.deleteReportedTrip('${repId}', '${data.tripId}')" style="background:#ff4444; color:white; font-size:0.85rem;">Eliminar Viaje Falso</button>
                            <button class="btn-approve" onclick="window.ignoreReport('${repId}')" style="background:#333; color:white; font-size:0.85rem;">Ignorar Falsa Alarma</button>
                        </div>
                    </div>`;
            });
            
            document.getElementById('reports-count').innerText = count;
            if (count === 0) grid.innerHTML = `<div style="grid-column:1/-1; color:#888;">No hay reportes pendientes.</div>`;
        }

        window.ignoreReport = async function(reportId) {
            if(!confirm("¿Estás seguro de que quieres ignorar este reporte?")) return;
            try {
                await updateDoc(doc(db, "reportes", reportId), { status: "ignorado" });
                loadReports();
            } catch(e) {
                alert("Error al actualizar el reporte: " + e.message);
            }
        };

        window.deleteReportedTrip = async function(reportId, tripId) {
            if(!confirm("⚠️ CUIDADO: Esto borrará el viaje de la base de datos para siempre. ¿Estás seguro?")) return;
            try {
                // Borramos el viaje tramposo
                await deleteDoc(doc(db, "tiempos_viaje", tripId));
                // Marcamos el reporte como resuelto
                await updateDoc(doc(db, "reportes", reportId), { status: "borrado_tramposo" });
                
                alert("Viaje eliminado con éxito. NOTA: Los puntos de este usuario y la tabla de clasificación no se actualizan en el momento, se corregirán cuando se suba un nuevo viaje en esa ruta.");
                loadReports();
            } catch(e) {
                alert("Error al borrar el viaje: " + e.message);
            }
        };

        // ------------------ CALCULAR BICIRATING DEL CLAN ------------------
        async function recalcularBiciRatingClan(clanId) {
            if (!clanId) return;
            const qUsers = query(collection(db, "usuarios"), where("clanId", "==", clanId));
            const snap = await getDocs(qUsers);
            let total = 0;
            snap.forEach(d => total += (d.data().biciRating || 0));
            await updateDoc(doc(db, "clanes", clanId), { biciRating: total });
        }


        // ------------------ EL CEREBRO: CÁLCULO DE BICIRATING (USUARIOS) ------------------
        async function recalcularRutaBiciRating(rutaString) {
            // 1. Obtener multiplicadores desde Firebase Config
            let multiplier = 1;
            const confDoc = await getDoc(doc(db, "config", "general"));
            if(confDoc.exists()) {
                const data = confDoc.data();
                if (data.ruta_destacada === rutaString) multiplier = 2; // +100%
                else if (data.rutas_historicas && data.rutas_historicas.includes(rutaString)) multiplier = 1.5; // +50%
            }

            // 2. Traer todos los viajes verificados de ESTA ruta
            const qRoute = query(collection(db, "tiempos_viaje"), where("ruta", "==", rutaString), where("verificado", "==", true));
            const snap = await getDocs(qRoute);

            // 3. Filtrar para quedarnos solo con el MEJOR tiempo de cada usuario en esta ruta
            let userBestTimes = {}; 
            let usersInvolved = new Set(); // Todos los que alguna vez corrieron por aquí

            snap.forEach(d => {
                const data = d.data();
                const email = data.email_real;
                usersInvolved.add(email);
                
                // Si es su primera vez o es un tiempo mejor que el anterior que leímos
                if(!userBestTimes[email] || data.tiempo_segundos < userBestTimes[email].tiempo) {
                    userBestTimes[email] = { tiempo: data.tiempo_segundos };
                }
            });

            // 4. Ordenar los tiempos para sacar el Top 7 absoluto
            let topList = Object.entries(userBestTimes).map(([email, data]) => ({ email, ...data }));
            topList.sort((a, b) => a.tiempo - b.tiempo); // De más rápido a más lento

            // 5. Asignar los puntos base escalonados (Tu idea)
            let pointsMap = {};
            topList.forEach((u, index) => {
                let pts = 0;
                if (index === 0) pts = 80;
                else if (index === 1) pts = 65;
                else if (index === 2) pts = 55;
                else if (index === 3 || index === 4) pts = 35;
                else if (index === 5 || index === 6) pts = 20;

                // Multiplicamos y redondeamos para evitar decimales
                pointsMap[u.email] = Math.round(pts * multiplier);
            });

            // 6. Actualizar el perfil de CADA usuario que haya corrido en esta ruta
            let clanesAfectados = new Set();

            for (let email of usersInvolved) {
                const routePoints = pointsMap[email] || 0; // Si ha caído del Top 7, gana 0 puntos.
                
                const userRef = doc(db, "usuarios", email);
                const userDoc = await getDoc(userRef);
                
                if (userDoc.exists()) {
                    let uData = userDoc.data();
                    let dictRutas = uData.puntos_por_ruta || {};
                    let totalViajes = uData.viajes_verificados_totales || 0; // Viajes totales
                    
                    if (uData.clanId) clanesAfectados.add(uData.clanId); // Anotamos su clan

                    // Actualizamos su medalla invisible para esta ruta específica
                    dictRutas[rutaString] = routePoints;

                    // SUMAMOS SU BICIRATING TOTAL
                    // (5 puntos por cada viaje subido y verificado) + (La suma de todas sus medallas en rutas)
                    let sumMedallas = 0;
                    for (let r in dictRutas) sumMedallas += dictRutas[r];

                    let finalBiciRating = (totalViajes * 5) + sumMedallas;

                    await updateDoc(userRef, {
                        puntos_por_ruta: dictRutas,
                        biciRating: finalBiciRating
                    });
                }
            }

            // 7. Actualizar el BiciRating global de los clanes involucrados
            for (let cId of clanesAfectados) {
                await recalcularBiciRatingClan(cId);
            }
        }

        // ------------------ EL CEREBRO 2: DUEÑOS DE ESTACIONES (CLANES) ------------------
        const userClanCache = {};
        async function getUserClan(email) {
            if (userClanCache[email] !== undefined) return userClanCache[email];
            const userDoc = await getDoc(doc(db, "usuarios", email));
            const clanId = userDoc.exists() ? (userDoc.data().clanId || null) : null;
            userClanCache[email] = clanId;
            return clanId;
        }

        async function recalcularEstacion(numEstacion) {
            const qAll = query(collection(db, "tiempos_viaje"), where("verificado", "==", true));
            const snap = await getDocs(qAll);

            let viajesPorRuta = {};
            snap.forEach(d => {
                const data = d.data();
                const parts = data.ruta.split('-');
                const orig = parts[0].replace(/^0+/, '') || "0";
                const dest = parts[1].replace(/^0+/, '') || "0";

                if (orig === numEstacion || dest === numEstacion) {
                    if (!viajesPorRuta[data.ruta]) viajesPorRuta[data.ruta] = [];
                    viajesPorRuta[data.ruta].push(data);
                }
            });

            let puntosClan = {};

            for (const [ruta, viajes] of Object.entries(viajesPorRuta)) {
                viajes.sort((a,b) => a.tiempo_segundos - b.tiempo_segundos);
                const top10 = viajes.slice(0, 10);

                for (let i = 0; i < top10.length; i++) {
                    const clanId = await getUserClan(top10[i].email_real);
                    if (clanId) {
                        let pts = 0;
                        if (i === 0) pts = 7;
                        else if (i === 1) pts = 5;
                        else if (i === 2) pts = 3;
                        else if (i >= 3 && i <= 9) pts = 1;
                        puntosClan[clanId] = (puntosClan[clanId] || 0) + pts;
                    }
                }
            }

            let dominante = null; let maxPts = 0; let sumTotal = 0;
            for (const [clan, pts] of Object.entries(puntosClan)) {
                sumTotal += pts;
                if (pts > maxPts) { maxPts = pts; dominante = clan; }
            }

            await setDoc(doc(db, "estaciones_stats", numEstacion), {
                clan_dominante: dominante, total_puntos: sumTotal, puntos_detalle: puntosClan
            }, { merge: true });
        }


        // ------------------ EVENTOS DE BOTONES (APROBAR/RECHAZAR) ------------------
        function attachEvents() {
            document.querySelectorAll('.view-photo').forEach(b => b.onclick = e => { document.getElementById('modal-img').src = e.target.getAttribute('data-url'); document.getElementById('photo-modal').style.display = 'flex'; });
            
            document.querySelectorAll('.approve-btn').forEach(b => b.onclick = async e => { 
                e.target.disabled = true; e.target.innerText = "Calculando Ratings..."; 
                
                const docId = e.target.getAttribute('data-id');
                const ruta = e.target.getAttribute('data-ruta');
                const email = e.target.getAttribute('data-email');

                try {
                    // 1. Aprobar viaje
                    await updateDoc(doc(db, "tiempos_viaje", docId), { verificado: true }); 

                    // 2. Sumar +1 viaje válido al perfil del usuario
                    const userRef = doc(db, "usuarios", email);
                    const userD = await getDoc(userRef);
                    if(userD.exists()) {
                        let vvt = (userD.data().viajes_verificados_totales || 0) + 1;
                        await updateDoc(userRef, { viajes_verificados_totales: vvt });
                    }

                    // 3. Recalcular BiciRating (Jugadores y Clanes)
                    await recalcularRutaBiciRating(ruta);

                    // 4. Recalcular Dominio de Estaciones (Control de Mapa)
                    const parts = ruta.split('-');
                    const estOrigen = parts[0].replace(/^0+/, '') || "0";
                    const estDestino = parts[1].replace(/^0+/, '') || "0";
                    await recalcularEstacion(estOrigen);
                    await recalcularEstacion(estDestino);

                    loadPendingTrips(); 
                } catch(err) {
                    alert("Error al aprobar: " + err.message);
                    e.target.disabled = false; e.target.innerText = "Aprobar";
                }
            });

            document.querySelectorAll('.reject-btn').forEach(b => b.onclick = async e => { 
                if(confirm("¿Seguro que quieres borrar este récord?")) { 
                    e.target.disabled = true; e.target.innerText = "Borrando..."; 
                    await deleteDoc(doc(db, "tiempos_viaje", e.target.getAttribute('data-id'))); 
                    loadPendingTrips(); 
                } 
            });
        }
        
        document.getElementById('close-modal').onclick = () => document.getElementById('photo-modal').style.display = 'none';
    </script>
